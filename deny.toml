[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
yanked = "warn"

[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "MIT-0",
  "Zlib",
  "EPL-2.0",
  # Required transitively by dirs-sys → option-ext.
  "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
