[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
version = 2
yanked = "warn"
ignore = [
  # REMOVE when 'cargo tree -i derivative' is empty after a starlark family bump — transitive via starlark_lsp, RUSTSEC-2024-0388 informational-only.
  "RUSTSEC-2024-0388",
  # REMOVE when 'cargo tree -i paste' is empty after a starlark family bump — paste unmaintained (transitive via starlark), RUSTSEC-2024-0436 informational-only, no safe upgrade.
  "RUSTSEC-2024-0436",
  # REMOVE when 'cargo tree -i fxhash' is empty after a starlark family bump — fxhash unmaintained (transitive via starlark_map), RUSTSEC-2025-0057 informational-only.
  "RUSTSEC-2025-0057",
  # REMOVE when 'cargo tree -i proc-macro-error2' is empty — proc-macro-error2 unmaintained (transitive via oci-client → oci-spec → getset), RUSTSEC-2026-0173 informational-only, no safe upgrade available.
  "RUSTSEC-2026-0173",
  # REMOVE when 'cargo tree -i rsa' is empty — rsa (Marvin timing sidechannel,
  # RUSTSEC-2023-0071) is pulled transitively via sigstore → openidconnect for
  # OIDC JWT (RS256) public-key verification. OCX signs and verifies with ECDSA
  # P-256 only (adr_oci_referrers_signing_v1.md S1-A) and holds no RSA private
  # key; the attack targets RSA private-key decryption timing, not the public
  # verify path OCX exercises. No safe upgrade exists (per the advisory).
  "RUSTSEC-2023-0071",
]

[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "MIT-0",
  "Zlib",
  "EPL-2.0",
  # Required transitively by dirs-sys → option-ext.
  "MPL-2.0",
  # Permissive (OSI-approved, FSF Free/Libre). Required transitively via the
  # starlark family: starlark → rustyline → clipboard-win → error-code.
  # REMOVE when 'cargo tree -i error-code' is empty after a starlark family bump.
  "BSL-1.0",
  # Permissive (OSI-approved, FSF Free/Libre). Required transitively via the
  # starlark family: starlark → debugserver-types → schemafy → Inflector.
  # REMOVE when 'cargo tree -i inflector' is empty after a starlark family bump.
  "BSD-2-Clause",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
