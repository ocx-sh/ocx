[package]
name = "ocx_lib"
version.workspace = true
edition = "2024"
license.workspace = true
publish = false
exclude = ["src/test_data/**"]

[features]
default = []
jsonschema = ["dep:schemars"]
progress = ["dep:indicatif", "dep:tracing-indicatif"]

[dependencies]
schemars = { version = "1", optional = true }
tokio = { workspace = true }

oci-client = "0.16.0"
lzma-rust2 = "0.16.2"
serde_json = "1.0.149"
serde = { version = "1.0.*", features = ["derive"] }
sha2 = "0.10.9"
hex = "0.4.3"
indexmap = "2"
toml = "1.0.6"
flate2 = "1.1.9"
tar = "0.4.44"
tempfile = "3.25.0"
serde_repr = "0.1.20"
serde_yaml_ng = { workspace = true }
futures = "0.3.31"
fs2 = "0.4.3"
chrono = "0.4.43"
regex = "1.12.3"
lazy_static = "1.5.0"
async-trait = "0.1.89"
docker_credential = "1.3.2"
symlink = "0.1.0"
dunce = "1.0.5"
sysinfo = "0.38.4"
clap_builder = "4.5.60"
console = "0.16"
clap_complete = "4.5.66"
tracing = "0.1.44"
tracing-log = "0.2.0"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "std", "fmt", "registry"] }
which = "8"
# "deflate" unfortunately pulls in zopfli; zip crate doesn't expose flate2-only deflate
zip = { version = "2", default-features = false, features = ["deflate"] }
indicatif = { version = "0.18.3", features = ["tokio"], optional = true }
tracing-indicatif = { version = "0.3.14", optional = true }

[target.'cfg(windows)'.dependencies]
junction = "1.2.0"

[lints]
workspace = true
