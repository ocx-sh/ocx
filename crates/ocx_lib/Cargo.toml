[package]
name = "ocx_lib"
edition = "2024"
exclude = ["src/test_data/**"]

[features]
default = []

[dependencies]
tokio = { workspace = true }

oci-client = "0.16.0"
lzma-rust2 = "0.15.7"
serde_json = "1.0.149"
serde = { version = "1.0.*", features = ["derive"] }
sha2 = "0.10.9"
hex = "0.4.3"
toml = "0.9.11"
flate2 = "1.1.9"
tar = "0.4.44"
tempfile = "3.25.0"
serde_repr = "0.1.20"
futures = "0.3.31"
fs2 = "0.4.3"
chrono = "0.4.43"
regex = "1.12.3"
lazy_static = "1.5.0"
async-trait = "0.1.89"
docker_credential = "1.3.2"
symlink = "0.1.0"
dunce = "1.0.5"
sysinfo = "0.38.2"
clap_builder = "4.5.60"
clap_complete = "4.5.66"
tracing = "0.1.44"
tracing-log = "0.2.0"

[lints]
workspace = true
