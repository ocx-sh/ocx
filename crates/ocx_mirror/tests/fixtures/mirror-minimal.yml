# Mirror spec: minimal single-platform fixture for golden renderer tests (§3.3).
# One platform (linux/amd64), one container (ubuntu:24.04), one test.
# No poll_interval — schedule trigger omitted in rendered workflow.
name: shfmt
target:
  registry: ocx.sh
  repository: shfmt

source:
  type: github_release
  owner: mvdan
  repo: sh
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "shfmt_v.*_linux_amd64$"

asset_type:
  type: binary
  name: shfmt

skip_prereleases: true
cascade: true
build_timestamp: none

tests:
  - name: version
    command: shfmt --version

platforms:
  linux/amd64:
    runner: ubuntu-latest
    containers:
      - image: ubuntu:24.04
        shell: bash

ocx_mirror:
  release_tag: v0.7.2
