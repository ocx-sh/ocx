# Generated by ocx-mirror v{OCX_MIRROR_VERSION} (rev {OCX_MIRROR_REV})
# DO NOT EDIT — re-run `ocx-mirror pipeline generate ci` to update.
# Source: mirror.yml

name: {MIRROR_NAME}

on:
{SCHEDULE_BLOCK}  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - mirror.yml
      - scripts/**
      - .github/workflows/mirror.yml

concurrency:
  group: mirror-${{ github.workflow }}-publish
  cancel-in-progress: false

env:
  OCX_MIRROR_RELEASE_TAG: {OCX_MIRROR_RELEASE_TAG}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.plan.outputs.has_new }}
      versions: ${{ steps.plan.outputs.versions }}
      target: ${{ steps.plan.outputs.target }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: ocx
      - name: Install ocx-mirror
        run: |
          cargo install --path ocx/crates/ocx_mirror --locked
      - name: Install ocx (host)
        run: |
          set -euo pipefail
          cargo install --path ocx/crates/ocx_cli --locked --root "${RUNNER_TEMP}/ocx-host"
          echo "${RUNNER_TEMP}/ocx-host/bin" >> "${GITHUB_PATH}"
      - id: plan
        name: Plan versions
        run: |
          set -euo pipefail
          ocx-mirror pipeline plan --format json > plan.json
          echo "has_new=$(jq -r '.has_new' plan.json)" >> "${GITHUB_OUTPUT}"
          echo "versions=$(jq -c '.versions' plan.json)" >> "${GITHUB_OUTPUT}"
          echo "target=$(jq -r '.target' plan.json)" >> "${GITHUB_OUTPUT}"

  prepare:
    needs: discover
    if: needs.discover.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.discover.outputs.versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: ocx
      - name: Install ocx-mirror
        run: |
          cargo install --path ocx/crates/ocx_mirror --locked
      - name: Install ocx (host)
        run: |
          set -euo pipefail
          cargo install --path ocx/crates/ocx_cli --locked --root "${RUNNER_TEMP}/ocx-host"
          echo "${RUNNER_TEMP}/ocx-host/bin" >> "${GITHUB_PATH}"
      - name: Prepare ${{ matrix.version.version }}
        run: |
          set -euo pipefail
          ocx-mirror pipeline prepare --version "${{ matrix.version.version }}"
          # Flatten .ocx-mirror/{V}/{P}/bundle.tar.xz → bundles/bundle-{V}-{P_slug}.tar.xz
          # and copy spec-level metadata.json as sibling so `ocx package test`
          # auto-discovers it via its bundle→metadata sibling convention.
          V="${{ matrix.version.version }}"
          mkdir -p bundles
          shopt -s nullglob
          for platform_dir in ".ocx-mirror/${V}"/*/; do
            [ -d "${platform_dir}" ] || continue
            P_SLUG=$(basename "${platform_dir}")
            cp "${platform_dir}bundle.tar.xz" "bundles/bundle-${V}-${P_SLUG}.tar.xz"
            cp metadata.json "bundles/bundle-${V}-${P_SLUG}-metadata.json"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bundle-${{ matrix.version.version }}
          path: bundles/
          retention-days: 1

  test:
    needs: [discover, prepare]
    if: needs.discover.outputs.has_new == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
{TEST_MATRIX_ENTRIES}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: ocx
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: bundle-*
          path: bundles/
          merge-multiple: true
      - name: Install ocx (host/native)
        shell: bash
        run: |
          set -euo pipefail
          cargo install --path ocx/crates/ocx_cli --locked --root "${RUNNER_TEMP}/ocx-host"
          echo "${RUNNER_TEMP}/ocx-host/bin" >> "${GITHUB_PATH}"
      - name: Build ocx for musl (container)
        if: matrix.container_id != '_native_'
        shell: bash
        run: |
          set -euo pipefail
          # Static musl binary works on both glibc (ubuntu) and musl (alpine) containers.
          MUSL_TARGET="$(uname -m)-unknown-linux-musl"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
          rustup target add "${MUSL_TARGET}"
          cargo install --path ocx/crates/ocx_cli --locked \
            --target "${MUSL_TARGET}" \
            --root "${RUNNER_TEMP}/ocx-musl"
      - name: Inject ocx into container image
        if: matrix.container_id != '_native_'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/ocx-container-ctx"
          cp "${RUNNER_TEMP}/ocx-musl/bin/ocx" "${RUNNER_TEMP}/ocx-container-ctx/ocx"
          cat > "${RUNNER_TEMP}/ocx-container-ctx/Dockerfile" <<'DOCKERFILE'
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE}
          RUN if command -v apt-get >/dev/null 2>&1; then \
                apt-get update && apt-get install -y --no-install-recommends ca-certificates && rm -rf /var/lib/apt/lists/*; \
              elif command -v apk >/dev/null 2>&1; then \
                apk add --no-cache ca-certificates; \
              fi
          ADD ocx /usr/bin/ocx
          RUN chmod +x /usr/bin/ocx
          DOCKERFILE
          IMAGE_TAG="ocx-test-${{ matrix.platform_slug }}-${{ matrix.container_id }}:{OCX_MIRROR_RELEASE_TAG}"
          docker build \
            --build-arg "BASE_IMAGE=${{ matrix.image }}" \
            --tag "${IMAGE_TAG}" \
            "${RUNNER_TEMP}/ocx-container-ctx"
      # Resolve this matrix leg's html_url up front via `gh api` so the JUnit
      # emit step can embed it as a `ci.job.url` testsuite property. GitHub
      # Actions has no default env var carrying the per-leg URL (only the
      # workflow run URL), so one API call per matrix leg is unavoidable.
      - name: Run tests for all versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CI_JOB_URL=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq ".jobs[] | select(.name | contains(\"${{ matrix.platform_slug }}\") and contains(\"${{ matrix.container_id }}\")) | .html_url" \
            | head -n1 || true)
          export CI_JOB_URL
          VERSIONS='${{ needs.discover.outputs.versions }}'
          for VERSION in $(echo "${VERSIONS}" | jq -r '.[].version'); do
            BUNDLE="bundles/bundle-${VERSION}-${{ matrix.platform_slug }}.tar.xz"
{TEST_RUN_STEPS}
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: junit-${{ matrix.platform_slug }}-${{ matrix.container_id }}
          path: junit/
          retention-days: 1

  push:
    needs: [discover, prepare, test]
    if: needs.discover.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    outputs:
      any_new_green: ${{ steps.summarise.outputs.any_new_green }}
      any_red: ${{ steps.summarise.outputs.any_red }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: ocx
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: bundle-*
          path: .artifacts/bundles/
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: junit-*
          path: .artifacts/junit/
          merge-multiple: true
      - name: Install ocx-mirror
        run: |
          cargo install --path ocx/crates/ocx_mirror --locked
      - name: Install ocx (host)
        run: |
          set -euo pipefail
          cargo install --path ocx/crates/ocx_cli --locked --root "${RUNNER_TEMP}/ocx-host"
          echo "${RUNNER_TEMP}/ocx-host/bin" >> "${GITHUB_PATH}"
      # Use docker login so ocx picks credentials up via its
      # native-credential fallback (`get_docker_auth` in crates/ocx_lib/src/auth.rs).
      # Env-var auth (`OCX_AUTH_<REG>_USER/_TOKEN`) takes precedence over the
      # docker fallback inside ocx, so do NOT also export those vars here.
      - name: Login to {TARGET_REGISTRY}
        run: |
          echo "${{ secrets.OCX_MIRROR_REGISTRY_TOKEN }}" \
            | docker login {TARGET_REGISTRY} \
                -u "${{ secrets.OCX_MIRROR_REGISTRY_USER }}" \
                --password-stdin
      - name: Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Resolve this push job's html_url so the Discord embed can link
          # green rows + push-tier failures back to push logs. GHA has no
          # default env var for the per-job URL.
          OCX_MIRROR_JOB_URL=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq '.jobs[] | select(.name == "push") | .html_url' \
            | head -n1 || true)
          export OCX_MIRROR_JOB_URL
          ocx-mirror pipeline push \
            --bundles-dir .artifacts/bundles \
            --junit-dir .artifacts/junit \
            --write-summary run-summary.json
      # `if: always()` keeps the job outputs flowing to `notify` even when the
      # push step exits non-zero (full-red run). Without it, a failed push job
      # leaves the outputs empty and the notify gate evaluates to false.
      - id: summarise
        if: always()
        name: Export summary outputs
        run: |
          if [ -f run-summary.json ]; then
            echo "any_new_green=$(jq -r '.any_new_green' run-summary.json)" >> "${GITHUB_OUTPUT}"
            echo "any_red=$(jq -r '.any_red' run-summary.json)" >> "${GITHUB_OUTPUT}"
          fi
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: run-summary
          path: run-summary.json
          retention-days: 1
          if-no-files-found: ignore
      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040  # v2.23.0
        with:
          files: .artifacts/junit/**/*.xml

  notify:
    needs: [discover, push]
    if: >-
      always() &&
      needs.discover.outputs.has_new == 'true' &&
      (needs.push.outputs.any_new_green == 'true' || needs.push.outputs.any_red == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: ocx
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: run-summary
      - name: Install ocx-mirror
        run: |
          cargo install --path ocx/crates/ocx_mirror --locked
      - name: Notify
        run: |
          ocx-mirror pipeline notify \
            --run-summary run-summary.json \
            --webhook-env-var {WEBHOOK_ENV_VAR}
        env:
          {WEBHOOK_ENV_VAR}: ${{ secrets.{WEBHOOK_ENV_VAR} }}
