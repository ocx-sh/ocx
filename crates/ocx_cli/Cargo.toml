[package]
name = "ocx"
version.workspace = true
edition = "2024"
license.workspace = true
repository = "https://github.com/ocx-sh/ocx"

[[bin]]
name = "ocx"
path = "src/main.rs"

[dependencies]
ocx_lib = { workspace = true }

tokio = { workspace = true }

clap = { version = "4", features = ["derive", "color"] }
clap_complete = "4.5.65"
anyhow = "1.0.101"
tar = "0.4.45"
lzma-rust2 = "0.16.0"
flate2 = "1.1.9"
futures = "0.3.31"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = [
    "env-filter",
    "std",
    "fmt",
    "json",
    "registry",
] }
tracing-log = "0.2.0"
serde = "1.0.228"
console = "0.16.2"

[lints]
workspace = true
