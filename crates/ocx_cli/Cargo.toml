[package]
name = "ocx"
version.workspace = true
edition = "2024"
license.workspace = true
repository = "https://github.com/ocx-sh/ocx"

[[bin]]
name = "ocx"
path = "src/main.rs"

[dependencies]
ocx_lib = { workspace = true }

tokio = { workspace = true }

clap = { version = "4", features = ["derive"] }
clap_complete = "4.6.0"
anyhow = "1.0.101"
serde_json = "1.0.149"
tar = "0.4.44"
lzma-rust2 = "0.16.0"
flate2 = "1.1.9"
futures = "0.3.31"
indicatif = { version = "0.18.3", features = ["tokio"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = [
    "env-filter",
    "std",
    "fmt",
    "json",
    "registry",
] }
tracing-indicatif = "0.3.14"
tracing-log = "0.2.0"
serde = "1.0.228"
console = "0.16.3"

[lints]
workspace = true
