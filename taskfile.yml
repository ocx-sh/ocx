# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

# Restores the committed project index (`adr_index_indirection.md` A1) as the
# active snapshot store for every task in this repository — removed in
# `3d13af27` when the project toolchain moved off `ocx package exec --self`,
# and re-added now that the snapshot is self-contained and git-tracked.
env:
  OCX_INDEX: '{{.ROOT_DIR}}/.ocx/index'

vars:
  REPORTS_ROOT: '{{.ROOT_DIR}}/target/reports'

includes:
  git: ./taskfiles/git.taskfile.yml
  infra: ./taskfiles/infra.taskfile.yml
  rust: ./taskfiles/rust.taskfile.yml
  shell: ./taskfiles/shell.taskfile.yml
  ci: ./taskfiles/ci.taskfile.yml
  coverage: ./taskfiles/coverage.taskfile.yml
  duplo: ./taskfiles/duplo.taskfile.yml
  release: ./taskfiles/release.taskfile.yml
  claude:
    taskfile: ./.claude/taskfile.yml
    dir: ./.claude
  test:
    taskfile: ./test/taskfile.yml
    dir: ./test
  recordings:
    taskfile: ./website/recordings.taskfile.yml
    dir: ./test
  schema:
    taskfile: ./website/schema.taskfile.yml
    dir: ./website
  website:
    taskfile: ./website/taskfile.yml
    dir: ./website

tasks:
  ocx:index-update:
    desc: Updates this repository's index lock.
    # Runs the released `ocx` resolved off PATH (via direnv/setup-ocx), not this
    # branch's build. After a wire-grammar change (root/dispatch-object shape,
    # digest typing, etc.) that PATH binary writes the *old* shape into
    # `.ocx/index/` -- regenerate against the branch build instead, e.g.
    # `direnv exec . target/release/ocx index update ...` or `ocx run --
    # target/release/ocx index update ...`.
    cmds:
      - rm -rf .ocx/index
      - ocx index update shellcheck:0.11 shfmt:3 lychee:0 bun:1 uv:0 git-cliff:2
  ocx:dirty-update:
    desc: Temporary dirty update to solve chicken-and-egg for ocx automation within this repository.
    cmds:
      - cargo build --release --bin ocx
      - cp target/release/ocx ~/.local/bin/ocx

  push:
    vars:
      DATE:
        sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
    cmds:
      - git add .
      - git commit -m "{{ .DATE }}"
      - git push {{ .CLI_ARGS }}

  checkpoint:
    cmds:
      - if: '! [[ $(git show -s --format=%s HEAD) == "Checkpoint" ]]'
        cmd: git commit --allow-empty -m "Checkpoint"
      - cmd: git add .
      - cmd: git commit --amend --no-edit --allow-empty

  check:
    cmd: cargo check

  run:
    desc: Build and run ocx (pass args after --)
    cmd: cargo run --release --bin ocx -- {{.CLI_ARGS}}

  default:
    deps:
      - task: rust:format:check
      - task: rust:clippy:check
      - task: check

  # Shared internal helpers (called by subsystem taskfiles via :prefix)
  # Convention: dot-prefix (.name) for internal tasks, like GitLab CI hidden jobs.
  .ensure-cargo-tool:
    internal: true
    status:
      - '{{.TOOL}} --version'
    cmds:
      - cargo install --locked {{.CRATE | default .TOOL}}

  # Two-phase verify: parallel lint, then sequential build+test
  verify:
    desc: Full quality gate
    summary: |
      Phase 1 (parallel): format, clippy, shell lint, claude verify
      Phase 2 (sequential): license, build, unit tests, acceptance tests
      Use `task --force verify` to bypass caching.
      Use `task --status verify` to check freshness without running.
    cmds:
      - task: .verify:lint
      - task: .verify:build-test
      - task: .verify:mark

  .verify:mark:
    internal: true
    desc: Mark commit-verified state for the pre-commit hook.
    cmds:
      - mkdir -p {{.ROOT_DIR}}/.claude/hooks/.state
      - date +%s > {{.ROOT_DIR}}/.claude/hooks/.state/commit-verified

  verify:mark:
    desc: |
      Mark current tree state as verified (5-min TTL). Use after `task verify`
      passed and only cherry-pick / rebase merge-context changed (no semantic
      diff). Lets the pre-commit hook accept the commit without re-running
      the full verify pipeline.
    cmds:
      - task: .verify:mark

  .verify:lint:
    internal: true
    deps:
      - task: rust:format:check
      - task: rust:clippy:check
      - task: shell:verify
      - task: ci:verify
      - task: claude:verify

  .verify:build-test:
    internal: true
    cmds:
      - task: rust:license:check
      - task: rust:license:deps
      - task: rust:build
      - task: rust:test:unit
      - task: test:parallel
