# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

env:
  OCX_HOME: '{{ .ROOT_DIR }}/.ocx'
  # OCX_INDEX: '{{ .ROOT_DIR }}/.ocx/index'

includes:
  coverage: ./taskfiles/coverage.taskfile.yml
  recordings: ./taskfiles/recordings.taskfile.yml
  schema: ./taskfiles/schema.taskfile.yml
  format: ./taskfiles/format.taskfile.yml
  clippy: ./taskfiles/clippy.taskfile.yml
  release: ./taskfiles/release.taskfile.yml
  lint: ./taskfiles/lint.taskfile.yml
  sbom: ./taskfiles/sbom.taskfile.yml
  catalog: ./taskfiles/catalog.taskfile.yml
  mirror: ./taskfiles/mirror.taskfile.yml
  test:
    taskfile: ./test/taskfile.yml
    dir: ./test
  website:
    taskfile: ./website/taskfile.yml
    dir: ./website

tasks:
  push:
    vars:
      DATE:
        sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
    cmds:
      - git add .
      - git commit -m "{{ .DATE }}"
      - git push {{ .CLI_ARGS }}

  checkpoint:
    cmds:
      - if: '! [[ $(git show -s --format=%s HEAD) == "Checkpoint" ]]'
        cmd: git commit --allow-empty -m "Checkpoint"
      - cmd: git add .
      - cmd: git commit --amend --no-edit --allow-empty

  check:
    cmd: cargo check

  default:
    deps:
      - task: format:check
      - task: clippy:check
      - task: check

  build:
    desc: Build release binary
    cmd: cargo build --release -p ocx --locked

  install:nextest:
    internal: true
    cmds:
      - cargo install --locked cargo-nextest
    status:
      - cargo nextest --version

  test:unit:
    desc: Run unit tests
    deps:
      - install:nextest
    cmd: cargo nextest run --workspace --release --locked {{.CLI_ARGS}}

  install:hawkeye:
    internal: true
    cmds:
      - cargo install --locked hawkeye
    status:
      - hawkeye --version

  install:cargo-deny:
    internal: true
    cmds:
      - cargo install --locked cargo-deny
    status:
      - cargo deny --version

  license:check:
    desc: Check license headers on all source files
    deps:
      - install:hawkeye
    cmds:
      - hawkeye check

  license:format:
    desc: Add or fix license headers on all source files
    deps:
      - install:hawkeye
    cmds:
      - hawkeye format

  license:deps:
    desc: Audit dependency licenses with cargo-deny
    deps:
      - install:cargo-deny
    cmds:
      - cargo deny check licenses

  verify:
    desc: Run all checks (fmt, clippy, build, unit tests, acceptance tests)
    cmds:
      - task: format:check
      - task: clippy:check
      - task: lint:shell
      - task: license:check
      - task: license:deps
      - task: build
      - task: test:unit
      - task: test:parallel
