# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  REPORTS_ROOT: '{{.ROOT_DIR}}/target/reports'

env:
  OCX_INDEX: '{{ .ROOT_DIR }}/.ocx/index'

includes:
  rust: ./taskfiles/rust.taskfile.yml
  shell: ./taskfiles/shell.taskfile.yml
  coverage: ./taskfiles/coverage.taskfile.yml
  duplo: ./taskfiles/duplo.taskfile.yml
  release: ./taskfiles/release.taskfile.yml
  mirror: ./taskfiles/mirror.taskfile.yml
  # Tool registrations (backed by ocx.taskfile.yml)
  shellcheck:
    taskfile: ./taskfiles/ocx.taskfile.yml
    internal: true
    vars:
      PACKAGE: 'ocx.sh/shellcheck:0.11'
      TOOL: shellcheck
      GLOB: '*.sh'
  shfmt:
    taskfile: ./taskfiles/ocx.taskfile.yml
    internal: true
    vars:
      PACKAGE: 'ocx.sh/shfmt:3'
      TOOL: shfmt
      GLOB: '*.sh'
  mirror-sdk:
    taskfile: ./mirror-sdk-py/taskfile.yml
    dir: ./mirror-sdk-py
  claude:
    taskfile: ./.claude/taskfile.yml
    dir: ./.claude
  test:
    taskfile: ./test/taskfile.yml
    dir: ./test
  recordings:
    taskfile: ./website/recordings.taskfile.yml
    dir: ./test
  schema:
    taskfile: ./website/schema.taskfile.yml
    dir: ./website
  website:
    taskfile: ./website/taskfile.yml
    dir: ./website

tasks:
  ocx:index-update:
    desc: Updates this repository's index lock.
    cmds:
      - rm -rf .ocx/index
      - ocx index update shellcheck:0.11 shfmt:3 lychee:0
  ocx:dirty-update:
    desc: Temporary dirty update to solve chicken-and-egg for ocx automation within this repository.
    cmds:
      - cargo build --release --bin ocx
      - cp target/release/ocx ~/.ocx/symlinks/ocx.sh/ocx/current/bin/ocx

  push:
    vars:
      DATE:
        sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
    cmds:
      - git add .
      - git commit -m "{{ .DATE }}"
      - git push {{ .CLI_ARGS }}

  checkpoint:
    cmds:
      - if: '! [[ $(git show -s --format=%s HEAD) == "Checkpoint" ]]'
        cmd: git commit --allow-empty -m "Checkpoint"
      - cmd: git add .
      - cmd: git commit --amend --no-edit --allow-empty

  check:
    cmd: cargo check

  run:
    desc: Build and run ocx (pass args after --)
    cmd: cargo run --release --bin ocx -- {{.CLI_ARGS}}

  default:
    deps:
      - task: rust:format:check
      - task: rust:clippy:check
      - task: check

  # Shared internal helpers (called by subsystem taskfiles via :prefix)
  # Convention: dot-prefix (.name) for internal tasks, like GitLab CI hidden jobs.
  .ensure-cargo-tool:
    internal: true
    status:
      - '{{.TOOL}} --version'
    cmds:
      - cargo install --locked {{.CRATE | default .TOOL}}

  # Two-phase verify: parallel lint, then sequential build+test
  verify:
    desc: Full quality gate
    summary: |
      Phase 1 (parallel): format, clippy, shell lint, claude verify
      Phase 2 (sequential): license, build, unit tests, acceptance tests
      Use `task --force verify` to bypass caching.
      Use `task --status verify` to check freshness without running.
    cmds:
      - task: .verify:lint
      - task: .verify:build-test
      - task: .verify:mark

  .verify:mark:
    internal: true
    desc: Mark commit-verified state for the pre-commit hook.
    cmds:
      - mkdir -p {{.ROOT_DIR}}/.claude/hooks/.state
      - date +%s > {{.ROOT_DIR}}/.claude/hooks/.state/commit-verified

  .verify:lint:
    internal: true
    deps:
      - task: rust:format:check
      - task: rust:clippy:check
      - task: shell:verify
      - task: claude:verify

  .verify:build-test:
    internal: true
    cmds:
      - task: rust:license:check
      - task: rust:license:deps
      - task: rust:build
      - task: rust:test:unit
      - task: test:parallel
