[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = []
# Target platforms to build apps for (Rust target-triple syntax)
# TEMPORARY: reduced to linux-only for faster CI test loop. Restore all 8 targets before final release:
# targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "aarch64-unknown-linux-musl", "aarch64-pc-windows-msvc", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
targets = ["x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl"]
# Where to host releases
hosting = "github"
# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".tar.xz"
# The archive format to use for windows builds (defaults .zip)
windows-archive = ".zip"
# Which actions to run on pull requests
pr-run-mode = "skip"
# Disable source tarball — LFS files can't be resolved in CI (persist-credentials: false)
source-tarball = false
# Plan jobs to run in CI
plan-jobs = ["./verify-version"]
# Post-announce jobs to run in CI
post-announce-jobs = ["./post-release-oci-publish", "./deploy-website"]
