[toolchain]
channel = "1.95.0"
profile = "default"
components = ["rustfmt", "clippy"]
# Windows shim cross-compile targets (crates/ocx_shim, issue #66). gnullvm
# (LLVM ABI) built hermetically via cargo-zigbuild so the committed blob is
# byte-reproducible across machines; resolves the former msvc-vs-gnu
# arch-review item. See adr_shim_hermetic_zigbuild.md.
targets = ["x86_64-pc-windows-gnullvm", "aarch64-pc-windows-gnullvm"]
