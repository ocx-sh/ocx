name: oras
target:
  registry: ocx.sh
  repository: oras

source:
  type: github_release
  owner: oras-project
  repo: oras
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "oras_.*_linux_amd64\\.tar\\.gz$"
  linux/arm64:
    - "oras_.*_linux_arm64\\.tar\\.gz$"
  darwin/amd64:
    - "oras_.*_darwin_amd64\\.tar\\.gz$"
  darwin/arm64:
    - "oras_.*_darwin_arm64\\.tar\\.gz$"
  windows/amd64:
    - "oras_.*_windows_amd64\\.zip$"

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "1.3.0"
  new_per_run: 10

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0
