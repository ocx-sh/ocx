name: bun
target:
  registry: ocx.sh
  repository: bun

source:
  type: github_release
  owner: oven-sh
  repo: bun
  tag_pattern: "^bun-v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "bun-linux-x64\\.zip$"
  linux/arm64:
    - "bun-linux-aarch64\\.zip$"
  darwin/amd64:
    - "bun-darwin-x64\\.zip$"
  darwin/arm64:
    - "bun-darwin-aarch64\\.zip$"
  windows/amd64:
    - "bun-windows-x64\\.zip$"
  windows/arm64:
    - "bun-windows-aarch64\\.zip$"

asset_type:
  type: archive
  strip_components: 1

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "1.3.10"
  new_per_run: 10

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0
