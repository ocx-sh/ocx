name: shfmt
target:
  registry: ocx.sh
  repository: shfmt

source:
  type: github_release
  owner: mvdan
  repo: sh
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

assets:
  linux/amd64:
    - "shfmt_v.*_linux_amd64$"
  linux/arm64:
    - "shfmt_v.*_linux_arm64$"
  darwin/amd64:
    - "shfmt_v.*_darwin_amd64$"
  darwin/arm64:
    - "shfmt_v.*_darwin_arm64$"
  windows/amd64:
    - "shfmt_v.*_windows_amd64\\.exe$"

asset_type:
  type: binary
  name: shfmt

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "3.5.0"
  new_per_run: 10

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0
