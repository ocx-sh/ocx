# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  METADATA_SCHEMA_DIR: "{{.ROOT_DIR}}/website/src/public/schemas/metadata"
  PROFILE_SCHEMA_DIR: "{{.ROOT_DIR}}/website/src/public/schemas/profile"
  CONFIG_SCHEMA_DIR: "{{.ROOT_DIR}}/website/src/public/schemas/config"

tasks:
  generate:
    desc: Generate JSON Schema for metadata.json
    sources:
      - '{{.ROOT_DIR}}/crates/ocx_schema/src/**/*.rs'
      - '{{.ROOT_DIR}}/crates/ocx_lib/src/**/*.rs'
      - '{{.ROOT_DIR}}/Cargo.lock'
    status:
      - test -f {{.METADATA_SCHEMA_DIR}}/v1.json
    cmds:
      - mkdir -p {{.METADATA_SCHEMA_DIR}}
      - cargo run -p ocx_schema --release -- metadata > {{.METADATA_SCHEMA_DIR}}/v1.json

  generate-profile:
    desc: Generate JSON Schema for profile.json
    sources:
      - '{{.ROOT_DIR}}/crates/ocx_schema/src/**/*.rs'
      - '{{.ROOT_DIR}}/crates/ocx_lib/src/**/*.rs'
      - '{{.ROOT_DIR}}/Cargo.lock'
    status:
      - test -f {{.PROFILE_SCHEMA_DIR}}/v1.json
    cmds:
      - mkdir -p {{.PROFILE_SCHEMA_DIR}}
      - cargo run -p ocx_schema --release -- profile > {{.PROFILE_SCHEMA_DIR}}/v1.json

  generate-config:
    desc: Generate JSON Schema for config.toml
    sources:
      - '{{.ROOT_DIR}}/crates/ocx_schema/src/**/*.rs'
      - '{{.ROOT_DIR}}/crates/ocx_lib/src/**/*.rs'
      - '{{.ROOT_DIR}}/Cargo.lock'
    status:
      - test -f {{.CONFIG_SCHEMA_DIR}}/v1.json
    cmds:
      - mkdir -p {{.CONFIG_SCHEMA_DIR}}
      - cargo run -p ocx_schema --release -- config > {{.CONFIG_SCHEMA_DIR}}/v1.json

  default:
    desc: Generate all schemas
    cmds:
      - task: generate
      - task: generate-profile
      - task: generate-config
