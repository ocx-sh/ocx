# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

x-shared:
  schema-sources: &schema-sources
    - '{{.ROOT_DIR}}/crates/ocx_schema/src/**/*.rs'
    - '{{.ROOT_DIR}}/crates/ocx_lib/src/**/*.rs'
    - '{{.ROOT_DIR}}/Cargo.lock'

vars:
  METADATA_SCHEMA_DIR: "{{.TASKFILE_DIR}}/src/public/schemas/metadata"
  CONFIG_SCHEMA_DIR: "{{.TASKFILE_DIR}}/src/public/schemas/config"
  PROJECT_SCHEMA_DIR: "{{.TASKFILE_DIR}}/src/public/schemas/project"
  PROJECT_LOCK_SCHEMA_DIR: "{{.TASKFILE_DIR}}/src/public/schemas/project-lock"
  PATCH_SCHEMA_DIR: "{{.TASKFILE_DIR}}/src/public/schemas/patch"

tasks:
  generate:
    desc: Generate JSON Schema for metadata.json
    sources: *schema-sources
    status:
      - test -f {{.METADATA_SCHEMA_DIR}}/v1.json
    cmds:
      - mkdir -p {{.METADATA_SCHEMA_DIR}}
      - cargo run -p ocx_schema --release -- metadata > {{.METADATA_SCHEMA_DIR}}/v1.json

  generate-config:
    desc: Generate JSON Schema for config.toml
    sources: *schema-sources
    status:
      - test -f {{.CONFIG_SCHEMA_DIR}}/v1.json
    cmds:
      - mkdir -p {{.CONFIG_SCHEMA_DIR}}
      - cargo run -p ocx_schema --release -- config > {{.CONFIG_SCHEMA_DIR}}/v1.json

  generate-project:
    desc: Generate JSON Schema for ocx.toml
    sources: *schema-sources
    status:
      - test -f {{.PROJECT_SCHEMA_DIR}}/v1.json
    cmds:
      - mkdir -p {{.PROJECT_SCHEMA_DIR}}
      - cargo run -p ocx_schema --release -- project > {{.PROJECT_SCHEMA_DIR}}/v1.json

  generate-project-lock:
    desc: Generate JSON Schema for ocx.lock
    sources: *schema-sources
    status:
      - test -f {{.PROJECT_LOCK_SCHEMA_DIR}}/v3.json
    cmds:
      - mkdir -p {{.PROJECT_LOCK_SCHEMA_DIR}}
      - cargo run -p ocx_schema --release -- project-lock > {{.PROJECT_LOCK_SCHEMA_DIR}}/v3.json

  generate-patch:
    desc: Generate JSON Schema for patch descriptor files (ocx patch publish --descriptor)
    sources: *schema-sources
    status:
      - test -f {{.PATCH_SCHEMA_DIR}}/v1.json
    cmds:
      - mkdir -p {{.PATCH_SCHEMA_DIR}}
      - cargo run -p ocx_schema --release -- patch > {{.PATCH_SCHEMA_DIR}}/v1.json

  default:
    desc: Generate all schemas
    cmds:
      - task: generate
      - task: generate-config
      - task: generate-project
      - task: generate-project-lock
      - task: generate-patch
