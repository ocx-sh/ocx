# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  install:
    cmd: bun install

  serve:
    deps:
      - install
    cmd: bunx vitepress dev

  build:
    deps:
      - install
    cmds:
      - task: :schema:generate
      - task: :recordings:build
      - task: :sbom:generate:page
      - task: :catalog:generate
      - bunx vitepress build

  deploy:
    desc: Deploy site via rsync
    deps:
      - build
    preconditions:
      - sh: '[ -n "$DEPLOY_HOST" ]'
        msg: "DEPLOY_HOST is not set (e.g. ocx-deploy@server)"
    cmds:
      - rsync -avz --delete .vitepress/dist/ "$DEPLOY_HOST:"
