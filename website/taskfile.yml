# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

includes:
  schema:
    taskfile: ./schema.taskfile.yml
    internal: true
  sbom:
    taskfile: ./sbom.taskfile.yml
    internal: true
  catalog:
    taskfile: ./catalog.taskfile.yml
    internal: true
  recordings:
    taskfile: ./recordings.taskfile.yml
    internal: true

vars:
  DEPLOY_HOST: '{{.DEPLOY_HOST | default "ocx-deploy"}}'

tasks:
  install:
    cmd: bun install

  serve:
    interactive: true
    deps:
      - install
    cmd: bunx vitepress dev

  build:
    deps:
      - install
    cmds:
      - task: schema:generate
      - task: recordings:parallel
      - task: sbom:generate:page
      - task: catalog:generate
      - bunx vitepress build

  deploy:
    desc: Deploy site via rsync (preserves licensed assets on server)
    deps:
      - build
    cmds:
      - rsync -avz --delete --exclude=/licensed/ .vitepress/dist/ "{{.DEPLOY_HOST}}:"

  deploy:licensed:
    desc: Push licensed assets (icons8 etc.) to server
    preconditions:
      - sh: '[ -d src/public/licensed ]'
        msg: "No licensed assets found in src/public/licensed/"
    cmds:
      - rsync -avz src/public/licensed/ "{{.DEPLOY_HOST}}:licensed/"
