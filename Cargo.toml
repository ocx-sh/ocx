[workspace]
resolver = "3"
members = ["crates/ocx_cli", "crates/ocx_lib", "crates/ocx_schema"]

[workspace.package]
version = "0.0.0"
license = "Apache-2.0"

[patch.crates-io]
oci-client = { path = "external/rust-oci-client" }

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"

[workspace.dependencies]
ocx_lib = { path = "crates/ocx_lib" }
tokio = { version = "1", features = ["full"] }

[workspace.lints]
