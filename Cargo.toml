[workspace]
resolver = "3"
members = ["crates/ocx_cli","crates/ocx_lib"]

[workspace.package]
license = "Apache-2.0"

[patch.crates-io]
oci-client = { path = "external/rust-oci-client" }

[workspace.dependencies]
ocx_lib = { path = "crates/ocx_lib" }
tokio = { version = "1", features = ["full"] }

[workspace.lints]
