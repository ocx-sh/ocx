# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Mirror orchestrator. Includes the template taskfile once per mirror package.
# Adding a new mirror: add an includes entry with PACKAGE and REPO vars.

version: '3'

vars:
  MIRRORS_DIR: "{{.ROOT_DIR}}/mirrors"

includes:
  cmake:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars:
      PACKAGE: cmake
      REPO: ocx.sh/cmake
  corretto-8:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars: { PACKAGE: corretto, REPO: ocx.sh/corretto, SPEC_FILE: mirror-8.yml }
  corretto-11:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars: { PACKAGE: corretto, REPO: ocx.sh/corretto, SPEC_FILE: mirror-11.yml }
  corretto-17:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars: { PACKAGE: corretto, REPO: ocx.sh/corretto, SPEC_FILE: mirror-17.yml }
  corretto-21:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars: { PACKAGE: corretto, REPO: ocx.sh/corretto, SPEC_FILE: mirror-21.yml }
  corretto-25:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars: { PACKAGE: corretto, REPO: ocx.sh/corretto, SPEC_FILE: mirror-25.yml }
  go-task:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars:
      PACKAGE: go-task
      REPO: ocx.sh/go-task
  git-cliff:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars:
      PACKAGE: git-cliff
      REPO: ocx.sh/git-cliff
  bun:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars:
      PACKAGE: bun
      REPO: ocx.sh/bun
  nodejs:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars:
      PACKAGE: nodejs
      REPO: ocx.sh/nodejs
  ocx:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars:
      PACKAGE: ocx
      REPO: ocx.sh/ocx
  shellcheck:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars:
      PACKAGE: shellcheck
      REPO: ocx.sh/shellcheck
  shfmt:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars:
      PACKAGE: shfmt
      REPO: ocx.sh/shfmt
  uv:
    taskfile: ../mirrors/mirror.taskfile.yml
    vars:
      PACKAGE: uv
      REPO: ocx.sh/uv

tasks:
  describe-all:
    desc: Push README and logo for all mirrored packages
    cmds:
      - task: bun:describe
      - task: corretto-8:describe
      - task: cmake:describe
      - task: git-cliff:describe
      - task: go-task:describe
      - task: nodejs:describe
      - task: ocx:describe
      - task: shellcheck:describe
      - task: shfmt:describe
      - task: uv:describe
