# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  # Install cargo-edit (provides cargo set-version) if not already present.
  install:cargo-edit:
    internal: true
    cmds:
      - cargo install --locked cargo-edit
    status:
      - cargo set-version --version

  # Guard: the website embeds CHANGELOG.md via a VitePress @include, so the file
  # is compiled as a Vue template. A raw `<tag>` from a commit subject (e.g.
  # "ocx-<name>") breaks the build with "Element is missing end tag". cliff.toml
  # HTML-escapes angle brackets; this fails loudly if that escaping ever regresses.
  changelog:validate:
    internal: true
    cmds:
      - |
        if grep -nE '<[A-Za-z/]' CHANGELOG.md; then
          echo "ERROR: CHANGELOG.md contains raw HTML/Vue tags (lines above)." >&2
          echo "git-cliff escaping regressed; the website (VitePress) build will fail." >&2
          exit 1
        fi

  # Regenerate CHANGELOG.md from the full git history.
  changelog:
    desc: Update CHANGELOG.md from git history
    cmds:
      - git-cliff --output CHANGELOG.md
      - task: changelog:validate

  # Show what would go into the next release's changelog section.
  changelog:preview:
    desc: Preview unreleased changes
    cmds:
      - git-cliff --unreleased

  # Full release preparation: compute next version, update Cargo.toml + CHANGELOG, run verify.
  # After this task succeeds, the human reviews and commits.
  #
  # Version selection:
  #   task release:prepare                 # interactive menu: auto | patch | minor | major
  #   task release:prepare BUMP=minor      # skip the menu, force a bump level
  #   task release:prepare BUMP=auto VERSION=1.4.0   # pin an exact version (v prefix optional)
  #
  # BUMP is a required enum: with interactive mode on (.taskrc.yml) and a TTY it
  # renders a selection menu; on CI / no TTY it must be passed on the CLI.
  prepare:
    desc: 'Prepare a release (interactive: pick auto|patch|minor|major; or BUMP=<level> / VERSION=x.y.z)'
    deps:
      - install:cargo-edit
    requires:
      vars:
        - name: BUMP
          enum: [auto, patch, minor, major]
    vars:
      # git-cliff computes the next version from git history. `auto` lets it pick
      # the bump from conventional commits; otherwise BUMP forces the level.
      # VERSION pins an exact value and wins over BUMP.
      NEXT_VERSION:
        sh: |
          if [ -n "{{.VERSION}}" ]; then
            printf 'v%s' "{{.VERSION | default "" | trimPrefix "v"}}"
          elif [ "{{.BUMP}}" = "auto" ]; then
            git-cliff --bumped-version
          else
            git-cliff --bumped-version --bump "{{.BUMP}}"
          fi
    cmds:
      - echo "Next version:{{.NEXT_VERSION}}"
      - cargo set-version "{{.NEXT_VERSION | trimPrefix "v"}}"
      - git-cliff --tag "{{.NEXT_VERSION}}" -o CHANGELOG.md
      - task: changelog:validate
      - task verify
      - |
        echo ""
        echo "Release prepared ({{.NEXT_VERSION}}). Review changes, then:"
        echo "  git add -A && git commit -m 'release: {{.NEXT_VERSION}}'"
        echo "  git tag {{.NEXT_VERSION}}"
        echo "  git push --atomic origin main {{.NEXT_VERSION}}"
