# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

x-shared:
  rust-sources: &rust-sources
    - '{{.ROOT_DIR}}/crates/**/*.rs'
    - '{{.ROOT_DIR}}/crates/**/Cargo.toml'
    - '{{.ROOT_DIR}}/Cargo.lock'
    - '{{.ROOT_DIR}}/rustfmt.toml'
    - '{{.ROOT_DIR}}/clippy.toml'
    - exclude: '{{.ROOT_DIR}}/target/**'

tasks:
  verify:
    desc: Rust quality gate (format, clippy, license, build, unit tests)
    summary: |
      Runs all Rust-specific checks sequentially (fail-fast):
        1. cargo fmt --check
        2. cargo clippy
        3. hawkeye license headers
        4. cargo-deny license audit
        5. cargo build --release
        6. cargo nextest run
      Use during review-fix loops when only Rust code changed.
    cmds:
      - task: format:check
      - task: clippy:check
      - task: license:check
      - task: license:deps
      - task: build
      - task: test:unit

  format:check:
    desc: Check Rust formatting
    sources: *rust-sources
    cmd: cargo fmt --check

  format:apply:
    desc: Apply Rust formatting
    cmd: cargo fmt

  clippy:check:
    desc: Run clippy linter
    sources: *rust-sources
    cmd: cargo clippy --workspace --locked --all-targets -- -D warnings

  clippy:fix:
    desc: Auto-fix clippy warnings
    cmd: cargo clippy --workspace --locked --all-targets --fix --allow-dirty

  build:
    desc: Build release binary
    sources: *rust-sources
    status:
      - test -f {{.ROOT_DIR}}/target/release/ocx
    method: timestamp
    cmd: cargo build --release -p ocx --locked

  install:nextest:
    internal: true
    cmds:
      - task: :.ensure-cargo-tool
        vars: { TOOL: cargo-nextest, CRATE: cargo-nextest }

  test:unit:
    desc: Run unit tests
    sources: *rust-sources
    deps:
      - install:nextest
    cmd: cargo nextest run --workspace --release --locked {{.CLI_ARGS}}

  install:hawkeye:
    internal: true
    cmds:
      - task: :.ensure-cargo-tool
        vars: { TOOL: hawkeye, CRATE: hawkeye }

  install:cargo-deny:
    internal: true
    cmds:
      - task: :.ensure-cargo-tool
        vars: { TOOL: cargo-deny, CRATE: cargo-deny }

  license:check:
    desc: Check license headers on all source files
    deps:
      - install:hawkeye
    cmd: hawkeye check

  license:format:
    desc: Add or fix license headers on all source files
    deps:
      - install:hawkeye
    cmd: hawkeye format

  license:deps:
    desc: Audit dependency licenses with cargo-deny
    deps:
      - install:cargo-deny
    cmd: cargo deny check licenses

  install:cargo-zigbuild:
    internal: true
    # Pinned: a cargo-zigbuild release can change the link invocation and
    # perturb the byte-equality gate. Ephemeral CI runners install exactly
    # this; a dev box with another version is skipped by `.ensure-cargo-tool`
    # `--version` status — `cargo install --locked cargo-zigbuild@0.22.3
    # --force` before refreshing a blob. Zig itself is provisioned at a
    # pinned version by build-windows-shims.yml (dev: any zig on PATH).
    cmds:
      - task: :.ensure-cargo-tool
        vars: { TOOL: cargo-zigbuild, CRATE: cargo-zigbuild@0.22.3 }

  shim:build:
    desc: Cross-build the stripped Windows shim blob (issue #66)
    summary: |
      Hermetically cross-builds crates/ocx_shim with the size-tuned `shim`
      profile for one *-pc-windows-gnullvm target via cargo-zigbuild and
      writes the stripped binary to target/<TARGET>/shim/ocx-shim.exe. The
      committed blobs under crates/ocx_lib/src/shims/ and the SHIM_SHA256
      constants are refreshed from this output in a dedicated PR (see
      shim.rs module docs and adr_shim_hermetic_zigbuild.md). Required var:
      TARGET (x86_64-pc-windows-gnullvm | aarch64-pc-windows-gnullvm).
    requires:
      vars: [TARGET]
    deps:
      - install:cargo-zigbuild
    # Hermetic + reproducible: Zig bundles its own clang/lld/libc, so output
    # bytes depend only on pinned rustc (rust-toolchain.toml) + pinned zig +
    # source — no floating Microsoft SDK manifest (the old cargo-xwin
    # treadmill). `-Zbuild-std` + `-Cpanic=immediate-abort` sheds std's
    # backtrace machinery (gimli/addr2line/object/miniz) → ~65 KiB blob,
    # well under SHIM_SIZE_BUDGET. The gnullvm targets need the stack-probe
    # builtins; crates/ocx_shim/src/chkstk.rs supplies them inline.
    # RUSTC_BOOTSTRAP=1 enables -Z on the pinned stable toolchain. CI must
    # call this task, never raw cargo.
    env:
      RUSTC_BOOTSTRAP: '1'
      RUSTFLAGS: '-Zunstable-options -Cpanic=immediate-abort'
    cmd: cargo zigbuild -p ocx_shim --profile shim --locked --target {{.TARGET}} -Z build-std=std,panic_abort
