# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

includes:
  xwin-check-x86:
    taskfile: ./xwin.taskfile.yml
    internal: true
    vars: { TARGET: x86_64-pc-windows-msvc, SUBCOMMAND: check }
  xwin-check-arm:
    taskfile: ./xwin.taskfile.yml
    internal: true
    vars: { TARGET: aarch64-pc-windows-msvc, SUBCOMMAND: check }
  xwin-build-x86:
    taskfile: ./xwin.taskfile.yml
    internal: true
    vars: { TARGET: x86_64-pc-windows-msvc, SUBCOMMAND: "build --release" }
  xwin-build-arm:
    taskfile: ./xwin.taskfile.yml
    internal: true
    vars: { TARGET: aarch64-pc-windows-msvc, SUBCOMMAND: "build --release" }

x-shared:
  rust-sources: &rust-sources
    - '{{.ROOT_DIR}}/crates/**/*.rs'
    - '{{.ROOT_DIR}}/crates/**/Cargo.toml'
    - '{{.ROOT_DIR}}/Cargo.lock'
    - '{{.ROOT_DIR}}/rustfmt.toml'
    - '{{.ROOT_DIR}}/clippy.toml'
    - exclude: '{{.ROOT_DIR}}/target/**'

tasks:
  verify:
    desc: Rust quality gate (format, clippy, license, build, unit tests)
    summary: |
      Runs all Rust-specific checks sequentially (fail-fast):
        1. cargo fmt --check
        2. cargo clippy
        3. hawkeye license headers
        4. cargo-deny license audit
        5. cargo build --release
        6. cargo nextest run
      Use during review-fix loops when only Rust code changed.
    cmds:
      - task: format:check
      - task: clippy:check
      - task: license:check
      - task: license:deps
      - task: build
      - task: test:unit

  format:check:
    desc: Check Rust formatting
    sources: *rust-sources
    cmd: cargo fmt --check

  format:apply:
    desc: Apply Rust formatting
    cmd: cargo fmt

  clippy:check:
    desc: Run clippy linter
    sources: *rust-sources
    cmd: cargo clippy --workspace --locked --all-targets -- -D warnings

  clippy:fix:
    desc: Auto-fix clippy warnings
    cmd: cargo clippy --workspace --locked --all-targets --fix --allow-dirty

  build:
    desc: Build release binary
    sources: *rust-sources
    status:
      - test -f {{.ROOT_DIR}}/target/release/ocx
    method: timestamp
    cmd: cargo build --release -p ocx --locked

  install:nextest:
    internal: true
    cmds:
      - task: :.ensure-cargo-tool
        vars: { TOOL: cargo-nextest, CRATE: cargo-nextest }

  test:unit:
    desc: Run unit tests
    sources: *rust-sources
    deps:
      - install:nextest
    cmd: cargo nextest run --workspace --release --locked {{.CLI_ARGS}}

  install:hawkeye:
    internal: true
    cmds:
      - task: :.ensure-cargo-tool
        vars: { TOOL: hawkeye, CRATE: hawkeye }

  install:cargo-deny:
    internal: true
    cmds:
      - task: :.ensure-cargo-tool
        vars: { TOOL: cargo-deny, CRATE: cargo-deny }

  license:check:
    desc: Check license headers on all source files
    deps:
      - install:hawkeye
    cmd: hawkeye check

  license:format:
    desc: Add or fix license headers on all source files
    deps:
      - install:hawkeye
    cmd: hawkeye format

  license:deps:
    desc: Audit dependency licenses with cargo-deny
    deps:
      - install:cargo-deny
    cmd: cargo deny check licenses

  install:cargo-zigbuild:
    internal: true
    # Pinned: a cargo-zigbuild release can change the link invocation and
    # perturb the byte-equality gate. Ephemeral CI runners install exactly
    # this; a dev box with another version is skipped by `.ensure-cargo-tool`
    # `--version` status — `cargo install --locked cargo-zigbuild@0.22.3
    # --force` before refreshing a blob. Zig itself is provisioned at a
    # pinned version by build-windows-shims.yml (dev: any zig on PATH).
    cmds:
      - task: :.ensure-cargo-tool
        vars: { TOOL: cargo-zigbuild, CRATE: cargo-zigbuild@0.22.3 }

  shim:build:
    desc: Cross-build the stripped Windows shim blob (issue #66)
    summary: |
      Hermetically cross-builds crates/ocx_shim with the size-tuned `shim`
      profile for one *-pc-windows-gnullvm target via cargo-zigbuild and
      writes the stripped binary to target/<TARGET>/shim/ocx-shim.exe. The
      committed blobs under crates/ocx_lib/src/shims/ and the SHIM_SHA256
      constants are refreshed from this output in a dedicated PR (see
      shim.rs module docs and adr_shim_hermetic_zigbuild.md). Required var:
      TARGET (x86_64-pc-windows-gnullvm | aarch64-pc-windows-gnullvm).
    requires:
      vars: [TARGET]
    deps:
      - install:cargo-zigbuild
    # Hermetic + reproducible: Zig bundles its own clang/lld/libc, so output
    # bytes depend only on pinned rustc (rust-toolchain.toml) + pinned zig +
    # source — no floating Microsoft SDK manifest (the old cargo-xwin
    # treadmill). `-Zbuild-std` + `-Cpanic=immediate-abort` sheds std's
    # backtrace machinery (gimli/addr2line/object/miniz) → ~65 KiB blob,
    # well under SHIM_SIZE_BUDGET. The gnullvm targets need the stack-probe
    # builtins; crates/ocx_shim/src/chkstk.rs supplies them inline.
    # RUSTC_BOOTSTRAP=1 enables -Z on the pinned stable toolchain. CI must
    # call this task, never raw cargo.
    # Reproducibility: `/Brepro` zeroes the COFF TimeDateStamp + makes the
    # PE deterministic (lld-link embeds wall-clock time otherwise). NO
    # -Zbuild-std: rebuilding std per run is not byte-reproducible (verified —
    # two identical CI runs differed even with /Brepro), and it forced a
    # nightly bootstrap. The toolchain's prebuilt std is deterministic. The
    # gnullvm stack-probe gap is covered by crates/ocx_shim/src/chkstk.rs
    # (independent of build-std). Pure stable; larger blob (~280 KiB) is
    # within SHIM_SIZE_BUDGET — an accepted trade-off for reproducibility.
    env:
      RUSTFLAGS: '-Clink-arg=/Brepro'
    cmd: cargo zigbuild -p ocx_shim --profile shim --locked --target {{.TARGET}}

  check:windows:
    desc: Cross-compile-check both Windows MSVC targets via Docker (cargo-xwin, cached)
    summary: |
      Runs `cargo xwin check` for x86_64-pc-windows-msvc and
      aarch64-pc-windows-msvc inside the messense/cargo-xwin Docker image.
      Mirrors the CI cross-compile (verify-deep.yml) so Windows-only build
      breakage is catchable locally without a Windows host. First run
      downloads the MSVC SDK headers (~250 MiB) and crate registry into
      .cache/xwin/; subsequent runs reuse both caches plus target/xwin/
      so an unchanged tree finishes in seconds.
    cmds:
      - task: xwin-check-x86:exec
      - task: xwin-check-arm:exec

  build:windows:
    desc: Cross-build release binaries for both Windows MSVC targets via Docker (cargo-xwin, cached)
    summary: |
      Runs `cargo xwin build --release` for x86_64-pc-windows-msvc and
      aarch64-pc-windows-msvc inside the messense/cargo-xwin Docker image.
      Mirrors the CI cross-compile (verify-deep.yml) byte-for-byte modulo
      the Docker-from-host scaffolding. Produces
      target/xwin/<triple>/release/{ocx,ocx-mirror}.exe. Shares caches
      with check:windows under .cache/xwin/.
    cmds:
      - task: xwin-build-x86:exec
      - task: xwin-build-arm:exec
