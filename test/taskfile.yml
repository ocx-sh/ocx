# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  BIN_DIR: "{{.ROOT_DIR}}/test/bin"
  OCX_BINARY: "{{.BIN_DIR}}/ocx{{exeExt}}"
  OCX_MIRROR_BINARY: "{{.BIN_DIR}}/ocx-mirror{{exeExt}}"
  # The Windows native launcher shim. test_windows_shim.py is skipif
  # non-Windows, so on Linux/macOS legs this is a harmless check-only
  # compile (the ELF is never exercised; _find_shim_binary keeps skipping
  # because no `ocx-shim.exe` exists). On windows-latest it is the binary
  # the suite drives via OCX_SHIM_BINARY — the live shim gate.
  OCX_SHIM_BINARY: "{{.BIN_DIR}}/ocx-shim{{exeExt}}"
  SKIP_BUILD: '{{.SKIP_BUILD | default .CI | default "false"}}'

tasks:
  build:
    internal: true
    cmds:
      - cargo build --release -p ocx -p ocx_mirror -p ocx_shim --locked
      - mkdir -p {{.BIN_DIR}}
      - cp {{.ROOT_DIR}}/target/release/ocx{{exeExt}} {{.OCX_BINARY}}
      - cp {{.ROOT_DIR}}/target/release/ocx-mirror{{exeExt}} {{.OCX_MIRROR_BINARY}}
      - cp {{.ROOT_DIR}}/target/release/ocx-shim{{exeExt}} {{.OCX_SHIM_BINARY}}
    status:
      - '{{eq .SKIP_BUILD "true"}}'

  default:
    desc: Run acceptance tests (builds binary + starts registry automatically)
    cmds:
      - task: build
        vars:
          SKIP_BUILD: "{{.SKIP_BUILD}}"
      - uv run pytest {{.CLI_ARGS | default "-v"}}
    env:
      OCX_COMMAND: "{{.OCX_BINARY}}"
      OCX_MIRROR_COMMAND: "{{.OCX_MIRROR_BINARY}}"
      # _find_shim_binary() honours OCX_SHIM_BINARY first; pointing it at the
      # copied test/bin/ocx-shim{exe} makes test_windows_shim.py a live gate
      # on windows-latest and a no-op skip elsewhere (module is skipif Win32).
      OCX_SHIM_BINARY: "{{.OCX_SHIM_BINARY}}"

  quick:
    desc: Run acceptance tests in parallel without rebuilding the binary
    cmds:
      - task: default
        vars:
          SKIP_BUILD: "true"
          CLI_ARGS: '-n auto {{.CLI_ARGS | default "-v"}}'

  parallel:
    desc: Run acceptance tests in parallel
    sources:
      - tests/**/*.py
      - src/**/*.py
      - conftest.py
      - tests/conftest.py
      - pyproject.toml
      - '{{.ROOT_DIR}}/target/release/ocx'
    cmds:
      - task: default
        vars:
          CLI_ARGS: '-n auto {{.CLI_ARGS | default "-v"}}'
