# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  BIN_DIR: "{{.ROOT_DIR}}/test/bin"
  OCX_BINARY: "{{.BIN_DIR}}/ocx{{exeExt}}"
  OCX_MIRROR_BINARY: "{{.BIN_DIR}}/ocx-mirror{{exeExt}}"
  # The Windows native launcher shim. test_windows_shim.py is skipif
  # non-Windows, so on Linux/macOS legs this is a harmless check-only
  # compile (the ELF is never exercised; _find_shim_binary keeps skipping
  # because no `ocx-shim.exe` exists). On windows-latest it is the binary
  # the suite drives via OCX_SHIM_BINARY — the live shim gate.
  OCX_SHIM_BINARY: "{{.BIN_DIR}}/ocx-shim{{exeExt}}"
  SKIP_BUILD: '{{.SKIP_BUILD | default .CI | default "false"}}'

tasks:
  build:
    internal: true
    cmds:
      # `--features ocx/__testing` enables internal-only test seams in
      # `ocx_lib` (currently the `__OCX_SELF_IMAGE` override in
      # `package_manager::tasks::update_check` that lets
      # `test_self_update.py::test_self_update_installs_newer_version`
      # redirect the canonical `ocx.sh/ocx/cli` to localhost:5000). The
      # seams are loopback-only-asserted at runtime and compile-gated;
      # release builds never include them. See `crates/ocx_lib/Cargo.toml`
      # for the contract.
      - cargo build --release -p ocx -p ocx_mirror -p ocx_shim --features ocx/__testing --locked
      - mkdir -p {{.BIN_DIR}}
      - cp {{.ROOT_DIR}}/target/release/ocx{{exeExt}} {{.OCX_BINARY}}
      - cp {{.ROOT_DIR}}/target/release/ocx-mirror{{exeExt}} {{.OCX_MIRROR_BINARY}}
      - cp {{.ROOT_DIR}}/target/release/ocx-shim{{exeExt}} {{.OCX_SHIM_BINARY}}
    status:
      - '{{eq .SKIP_BUILD "true"}}'

  default:
    desc: Run acceptance tests (builds binary + starts registry automatically)
    cmds:
      - task: build
        vars:
          SKIP_BUILD: "{{.SKIP_BUILD}}"
      - uv run pytest {{.CLI_ARGS | default "-v"}}
    env:
      OCX_COMMAND: "{{.OCX_BINARY}}"
      OCX_MIRROR_COMMAND: "{{.OCX_MIRROR_BINARY}}"
      # _find_shim_binary() honours OCX_SHIM_BINARY first; pointing it at the
      # copied test/bin/ocx-shim{exe} makes test_windows_shim.py a live gate
      # on windows-latest and a no-op skip elsewhere (module is skipif Win32).
      OCX_SHIM_BINARY: "{{.OCX_SHIM_BINARY}}"

  quick:
    desc: Run acceptance tests in parallel without rebuilding the binary
    cmds:
      - task: default
        vars:
          SKIP_BUILD: "true"
          CLI_ARGS: '-n auto {{.CLI_ARGS | default "-v"}}'

  parallel:
    desc: Run acceptance tests in parallel
    sources:
      - tests/**/*.py
      - src/**/*.py
      - conftest.py
      - tests/conftest.py
      - pyproject.toml
      # Doc scripts are executed by the drift-gate collection inside this
      # parallel run (test_doc_scripts.py), so editing a .sh fixture must
      # invalidate the cache (Perf F3) — without this a doc-script change
      # is silently treated as up-to-date and the gate is skipped.
      - doc_scripts/**/*.sh
      - '{{.ROOT_DIR}}/target/release/ocx'
    cmds:
      - task: default
        vars:
          CLI_ARGS: '-n auto {{.CLI_ARGS | default "-v"}}'

  shells:
    desc: >-
      Build the shell-zoo Docker image and run the all-shell activation matrix
      (test_shell_activation.py) in-container — proves `ocx self setup` activation
      survives an unset OCX_HOME in every shell. Requires Docker. Defaults to the
      Debian/glibc image + the local glibc binary; CI overrides the vars for the
      Alpine/musl leg.
    vars:
      SHELLS_IMAGE: '{{.SHELLS_IMAGE | default "ocx-shells-debian"}}'
      SHELLS_DOCKERFILE: '{{.SHELLS_DOCKERFILE | default "docker/shells.Dockerfile"}}'
      SHELLS_OCX_BINARY: '{{.SHELLS_OCX_BINARY | default .OCX_BINARY}}'
    cmds:
      - task: build
        vars:
          SKIP_BUILD: "{{.SKIP_BUILD}}"
      - docker build -f {{.TASKFILE_DIR}}/{{.SHELLS_DOCKERFILE}} -t {{.SHELLS_IMAGE}} {{.TASKFILE_DIR}}/docker
      - >-
        docker run --rm
        -v "{{.SHELLS_OCX_BINARY}}:/work/ocx:ro"
        -v "{{.TASKFILE_DIR}}/tests/test_shell_activation.py:/work/test_shell_activation.py:ro"
        -e OCX_ACTIVATION_BINARY=/work/ocx
        {{.SHELLS_IMAGE}}
        python3 -m pytest -v -p no:cacheprovider /work/test_shell_activation.py

  doc-scripts:list:
    desc: Print the doc-script discovery export as JSON (PT6 seam for website publish task)
    dir: '{{.TASKFILE_DIR}}'
    cmd: uv run python scripts/doc_scripts_list.py
    env:
      OCX_DOC_SCRIPTS_ROOT: '{{.OCX_DOC_SCRIPTS_ROOT | default ""}}'

  doc-scripts:drift:
    desc: >-
      Run the full doc-script drift gate for ALL # doc: scripts (registry-backed
      executor + static binding/parser/publish collections). Deploy-CI only —
      NOT wired into `task verify` / `task` per the ADR cost-lever (registry
      provisioning is too expensive for the per-commit loop).
    cmds:
      - task: build
        vars:
          SKIP_BUILD: "{{.SKIP_BUILD}}"
      - >-
        uv run pytest -n auto
        tests/test_doc_scripts.py
        tests/test_doc_binding.py
        tests/test_doc_scripts_parser.py
        tests/test_doc_scripts_publish.py
        tests/test_doc_scripts_executor.py
        tests/test_doc_scripts_cast.py
        tests/test_doc_scripts_one_tree.py
        {{.CLI_ARGS | default "-q"}}
    env:
      OCX_COMMAND: "{{.OCX_BINARY}}"
      OCX_MIRROR_COMMAND: "{{.OCX_MIRROR_BINARY}}"
