# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  BIN_DIR: "{{.ROOT_DIR}}/test/bin"
  OCX_BINARY: "{{.BIN_DIR}}/ocx{{exeExt}}"
  # The Windows native launcher shim. test_windows_shim.py is skipif
  # non-Windows, so on Linux/macOS legs this is a harmless check-only
  # compile (the ELF is never exercised; _find_shim_binary keeps skipping
  # because no `ocx-shim.exe` exists). On windows-latest it is the binary
  # the suite drives via OCX_SHIM_BINARY — the live shim gate.
  OCX_SHIM_BINARY: "{{.BIN_DIR}}/ocx-shim{{exeExt}}"
  SKIP_BUILD: '{{.SKIP_BUILD | default .CI | default "false"}}'

tasks:
  build:
    internal: true
    cmds:
      # `--features ocx/__testing` enables internal-only test seams in
      # `ocx_lib` (currently the `__OCX_SELF_IMAGE` override in
      # `package_manager::tasks::update_check` that lets
      # `test_self_update.py::test_self_update_installs_newer_version`
      # redirect the canonical `ocx.sh/ocx/cli` to localhost:5000). The
      # seams are loopback-only-asserted at runtime and compile-gated;
      # release builds never include them. See `crates/ocx_lib/Cargo.toml`
      # for the contract.
      - cargo build --release -p ocx -p ocx_shim --features ocx/__testing --locked
      - mkdir -p {{.BIN_DIR}}
      - cp {{.ROOT_DIR}}/target/release/ocx{{exeExt}} {{.OCX_BINARY}}
      - cp {{.ROOT_DIR}}/target/release/ocx-shim{{exeExt}} {{.OCX_SHIM_BINARY}}
    status:
      - '{{eq .SKIP_BUILD "true"}}'

  default:
    desc: Run acceptance tests (builds binary + starts registry automatically)
    cmds:
      - task: build
        vars:
          SKIP_BUILD: "{{.SKIP_BUILD}}"
      - uv run pytest {{.CLI_ARGS | default "-v"}}
    env:
      OCX_COMMAND: "{{.OCX_BINARY}}"
      # _find_shim_binary() honours OCX_SHIM_BINARY first; pointing it at the
      # copied test/bin/ocx-shim{exe} makes test_windows_shim.py a live gate
      # on windows-latest and a no-op skip elsewhere (module is skipif Win32).
      OCX_SHIM_BINARY: "{{.OCX_SHIM_BINARY}}"

  quick:
    desc: Run acceptance tests in parallel without rebuilding the binary
    cmds:
      - task: default
        vars:
          SKIP_BUILD: "true"
          CLI_ARGS: '-n auto {{.CLI_ARGS | default "-v"}}'

  parallel:
    desc: Run acceptance tests in parallel
    sources:
      - tests/**/*.py
      - src/**/*.py
      - conftest.py
      - tests/conftest.py
      - pyproject.toml
      # Doc scripts are executed by the drift-gate collection inside this
      # parallel run (test_doc_scripts.py), so editing a .sh fixture must
      # invalidate the cache (Perf F3) — without this a doc-script change
      # is silently treated as up-to-date and the gate is skipped.
      - doc_scripts/**/*.sh
      - '{{.ROOT_DIR}}/target/release/ocx'
    cmds:
      - task: default
        vars:
          CLI_ARGS: '-n auto {{.CLI_ARGS | default "-v"}}'

  shells:
    desc: >-
      Build the shell-zoo Docker image and run the all-shell activation matrix
      (test_shell_activation.py) in-container — proves `ocx self setup` activation
      survives an unset OCX_HOME in every shell. Requires Docker. Defaults to the
      Debian/glibc image + the local glibc binary; CI overrides the vars for the
      Alpine/musl leg.
    vars:
      SHELLS_IMAGE: '{{.SHELLS_IMAGE | default "ocx-shells-debian"}}'
      SHELLS_DOCKERFILE: '{{.SHELLS_DOCKERFILE | default "docker/shells.Dockerfile"}}'
      SHELLS_OCX_BINARY: '{{.SHELLS_OCX_BINARY | default .OCX_BINARY}}'
    cmds:
      - task: build
        vars:
          SKIP_BUILD: "{{.SKIP_BUILD}}"
      - docker build -f {{.TASKFILE_DIR}}/{{.SHELLS_DOCKERFILE}} -t {{.SHELLS_IMAGE}} {{.TASKFILE_DIR}}/docker
      - >-
        docker run --rm
        -v "{{.SHELLS_OCX_BINARY}}:/work/ocx:ro"
        -v "{{.TASKFILE_DIR}}/tests/test_shell_activation.py:/work/test_shell_activation.py:ro"
        -e OCX_ACTIVATION_BINARY=/work/ocx
        {{.SHELLS_IMAGE}}
        python3 -m pytest -v -p no:cacheprovider /work/test_shell_activation.py

  # ---------------------------------------------------------------------------
  # Benchmark targets (bench: namespace)
  # All bench tasks require `task bench:setup` first (Docker bench profile).
  # `task test` is unaffected — the bench profile is never started by default.
  # ---------------------------------------------------------------------------

  bench:setup:
    desc: >-
      Start the bench Docker-compose profile (toxiproxy + registry). Required
      before running any bench:* target. Fails with a clear message when Docker
      is unavailable.
    dir: '{{.TASKFILE_DIR}}'
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: >-
          Docker is not running or not accessible.
          Start Docker and re-run `task bench:setup`.
    cmds:
      - docker compose -f {{.TASKFILE_DIR}}/docker-compose.yml --profile bench up -d
      # Wait for toxiproxy API to become reachable (up to 15 s).
      - >-
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8474/version > /dev/null 2>&1; then
            echo "toxiproxy API ready."; break;
          fi;
          sleep 0.5;
        done
      # Wait for registry to become reachable (already running from prior `task test`,
      # but in case bench:setup is called standalone).
      - >-
        for i in $(seq 1 30); do
          if curl -sf http://localhost:5000/v2/ > /dev/null 2>&1; then
            echo "registry ready."; break;
          fi;
          sleep 0.5;
        done

  bench:teardown:
    desc: >-
      Stop the bench-proxy container only — leaves registry + mirror-registry running
      so `task test` is unaffected. Use `docker compose down` manually to stop everything.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - docker compose -f {{.TASKFILE_DIR}}/docker-compose.yml --profile bench stop bench-proxy
      - docker compose -f {{.TASKFILE_DIR}}/docker-compose.yml --profile bench rm -f bench-proxy

  bench:baseline:
    desc: >-
      Run the full benchmark matrix against the CURRENT (pre-optimization) binary
      and save results as test/bench/baseline.json. Run this BEFORE any
      optimization lands. Requires bench:setup and hyperfine.
    dir: '{{.TASKFILE_DIR}}'
    deps: [build, bench:setup, .bench:acquire-hyperfine]
    cmds:
      - uv run python bench/harness.py --save-baseline
    env:
      OCX_COMMAND: "{{.OCX_BINARY}}"
      BENCH_RESULTS_DIR: "{{.TASKFILE_DIR}}/bench/results"

  bench:
    desc: >-
      Run the medium suite (regression gate, <4 min) and compare against baseline.json.
      Exits 1 if any scenario regresses beyond the 0.85x threshold.
      Requires bench:setup and hyperfine.
    dir: '{{.TASKFILE_DIR}}'
    deps: [build, bench:setup, .bench:acquire-hyperfine]
    cmds:
      - uv run python bench/harness.py --suite medium --compare
    env:
      OCX_COMMAND: "{{.OCX_BINARY}}"
      BENCH_RESULTS_DIR: "{{.TASKFILE_DIR}}/bench/results"

  bench:quick:
    desc: >-
      Fast subset benchmark (<1 min): small suite (unthrottled + 100 Mbps + parallel_2_processes).
      Fixture push skipped when registry already has the packages (deterministic repo names).
      Compares against baseline where entries exist. Requires bench:setup and hyperfine.
    dir: '{{.TASKFILE_DIR}}'
    deps: [build, bench:setup, .bench:acquire-hyperfine]
    cmds:
      - uv run python bench/harness.py --suite small --compare
    env:
      OCX_COMMAND: "{{.OCX_BINARY}}"
      BENCH_RESULTS_DIR: "{{.TASKFILE_DIR}}/bench/results"

  bench:large:
    desc: >-
      Extended benchmark run (<10 min): large suite adds higher-runs rows (runs=10)
      and larger payloads (50 MB, 25 MB layer rows) for tighter σ.
      Run before landing optimizations where statistical confidence matters.
      Requires bench:setup and hyperfine.
    dir: '{{.TASKFILE_DIR}}'
    deps: [build, bench:setup, .bench:acquire-hyperfine]
    cmds:
      - uv run python bench/harness.py --suite large --compare
    env:
      OCX_COMMAND: "{{.OCX_BINARY}}"
      BENCH_RESULTS_DIR: "{{.TASKFILE_DIR}}/bench/results"

  bench:scenario:
    desc: >-
      Run one or more named scenarios: task test:bench:scenario -- <name> [<name>...]
      Uses 3 runs, no warmup. Requires bench:setup and hyperfine.
    dir: '{{.TASKFILE_DIR}}'
    deps: [build, bench:setup, .bench:acquire-hyperfine]
    cmds:
      - uv run python bench/harness.py --scenarios {{.CLI_ARGS}} --runs 3 --warmup 0
    env:
      OCX_COMMAND: "{{.OCX_BINARY}}"
      BENCH_RESULTS_DIR: "{{.TASKFILE_DIR}}/bench/results"

  bench:report:
    desc: >-
      Generate the static HTML dashboard from the latest bench results.
      Writes test/bench/results/index.html (self-contained; no Docker required).
      Open the printed path in a browser to view the dashboard.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - uv run python bench/report.py

  .bench:acquire-hyperfine:
    desc: Download hyperfine 1.20.0 into test/bin/ if not already on PATH or in test/bin/.
    internal: true
    dir: '{{.TASKFILE_DIR}}'
    # status: exit 0 = up-to-date; hyperfine already on PATH or already in test/bin/.
    # `which hyperfine` succeeds if on PATH; `test -x` checks test/bin/ fallback.
    status:
      - which hyperfine || test -x {{.TASKFILE_DIR}}/bin/hyperfine
    cmds:
      - mkdir -p {{.TASKFILE_DIR}}/bin
      # Tag is positional, not a flag. Asset name verified against sharkdp/hyperfine
      # v1.20.0 release: hyperfine-v1.20.0-x86_64-unknown-linux-musl.tar.gz
      # The tarball extracts to hyperfine-v1.20.0-x86_64-unknown-linux-musl/hyperfine.
      # TODO: revisit once hyperfine is mirrored on ocx.sh (dogfood opportunity).
      - >-
        gh release download v1.20.0
        -R sharkdp/hyperfine
        -p 'hyperfine-v1.20.0-x86_64-unknown-linux-musl.tar.gz'
        -D /tmp/hyperfine-dl
        --clobber
      - tar -xzf /tmp/hyperfine-dl/hyperfine-v1.20.0-x86_64-unknown-linux-musl.tar.gz -C /tmp/hyperfine-dl
      - install -m755 /tmp/hyperfine-dl/hyperfine-v1.20.0-x86_64-unknown-linux-musl/hyperfine {{.TASKFILE_DIR}}/bin/hyperfine
      - rm -rf /tmp/hyperfine-dl

  doc-scripts:list:
    desc: Print the doc-script discovery export as JSON (PT6 seam for website publish task)
    dir: '{{.TASKFILE_DIR}}'
    cmd: uv run python scripts/doc_scripts_list.py
    env:
      OCX_DOC_SCRIPTS_ROOT: '{{.OCX_DOC_SCRIPTS_ROOT | default ""}}'

  doc-scripts:drift:
    desc: >-
      Run the full doc-script drift gate for ALL # doc: scripts (registry-backed
      executor + static binding/parser/publish collections). Deploy-CI only —
      NOT wired into `task verify` / `task` per the ADR cost-lever (registry
      provisioning is too expensive for the per-commit loop).
    cmds:
      - task: build
        vars:
          SKIP_BUILD: "{{.SKIP_BUILD}}"
      - >-
        uv run pytest -n auto
        tests/test_doc_scripts.py
        tests/test_doc_binding.py
        tests/test_doc_scripts_parser.py
        tests/test_doc_scripts_publish.py
        tests/test_doc_scripts_executor.py
        tests/test_doc_scripts_cast.py
        tests/test_doc_scripts_one_tree.py
        {{.CLI_ARGS | default "-q"}}
    env:
      OCX_COMMAND: "{{.OCX_BINARY}}"
