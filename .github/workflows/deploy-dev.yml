name: Deploy Dev

# Manual deploy pipeline. Run via `gh workflow run "Deploy Dev"` or the Actions
# UI. Builds all production targets (linux musl + darwin + windows) for `ocx`,
# then publishes them to `dev.ocx.sh/ocx/cli:<core>-dev_<TS>`.
# (`ocx-mirror` deploys from its own repo: github.com/ocx-sh/ocx-mirror.)
#
# Musl-only linux matches the prod target set in `post-release-oci-publish.yml`.
# Cross-compile uses cargo-zigbuild on ubuntu-22.04 (linux), native build on
# macos-latest (darwin), and `cargo xwin` in a container on ubuntu-latest
# (windows). Published artifacts are tagged as pre-release (`-dev_<TS>`) so
# they cannot collide with the stable release graph.

on:
  workflow_dispatch:

permissions:
  contents: read

# Serialize runs so the timestamp suffix stays monotonic; never cancel a
# publish in flight.
concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compute-version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.cliff.outputs.version }}
      version_tag: ${{ steps.cliff.outputs.version_tag }}
      # Semver form of `version_tag` (replaces the OCI-safe `_` separator
      # with `+`). dev-deploy publishes the OCI form to the registry
      # (`+` is not a valid OCI reference char) but the binary embeds
      # the semver form so `ocx version` reports a parseable semver.
      version_semver: ${{ steps.cliff.outputs.version_semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install git-cliff
        uses: taiki-e/install-action@56545b37b57562edd73171cb6c62cc509db4c34e # v2.81.7
        with:
          tool: git-cliff
      - name: Compute next version
        id: cliff
        shell: bash
        run: |
          set -euo pipefail
          raw="$(git-cliff --bumped-version)"
          version="${raw#v}"
          if [[ -z "$version" ]]; then
            echo "::error::git-cliff --bumped-version returned empty output; no commits since last tag — refusing to publish a dev build"
            exit 1
          fi
          # Freeze the UTC build-metadata segment here so every (variant, target)
          # leg of the publish loop shares the same tag. Computing it inside the
          # per-push `ocx package push --build-timestamp` would re-stamp each call
          # at second granularity and split the multi-platform index.
          ts="$(date -u +%Y%m%d%H%M%S)"
          echo "version=${version}"                  | tee -a "$GITHUB_OUTPUT"
          echo "version_tag=${version}-dev_${ts}"    | tee -a "$GITHUB_OUTPUT"
          # Semver form for in-binary embedding via `__OCX_BUILD_VERSION`:
          # `+` is invalid in OCI references but is the canonical
          # build-metadata separator per SemVer §10. Builds bake the
          # semver form so `ocx version` reports a parseable string.
          echo "version_semver=${version}-dev+${ts}" | tee -a "$GITHUB_OUTPUT"

  build-linux:
    name: Build (${{ matrix.target }})
    needs: [compute-version]
    # ubuntu-22.04 matches the runner cargo-dist plans for linux targets —
    # older glibc baseline for portability of any future gnu targets.
    runs-on: ubuntu-22.04
    # Job-level env propagates into the composite build action's `cargo
    # build`/`cargo zigbuild` step, so `build.rs` sees these and bakes
    # them into the binary as compile-time constants via `rustc-env`.
    env:
      __OCX_BUILD_VERSION: ${{ needs.compute-version.outputs.version_semver }}
      __OCX_BUILD_CHANNEL: dev
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false
      - name: Build
        uses: ./.github/actions/build-rust
        with:
          target: ${{ matrix.target }}
          # cargo-zigbuild covers aarch64 and musl targets uniformly from
          # x86_64 ubuntu runners; matches what cargo-dist uses for prod.
          use_zigbuild: true

  build-darwin:
    name: Build (${{ matrix.target }})
    needs: [compute-version]
    runs-on: macos-latest
    env:
      __OCX_BUILD_VERSION: ${{ needs.compute-version.outputs.version_semver }}
      __OCX_BUILD_CHANNEL: dev
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false
      - name: Build
        uses: ./.github/actions/build-rust
        with:
          target: ${{ matrix.target }}

  build-windows:
    name: Build (${{ matrix.target }})
    needs: [compute-version]
    runs-on: ubuntu-latest
    env:
      __OCX_BUILD_VERSION: ${{ needs.compute-version.outputs.version_semver }}
      __OCX_BUILD_CHANNEL: dev
    container:
      # messense/cargo-xwin has no stable versioned tag — pinned by digest. Re-pin with:
      #   docker pull messense/cargo-xwin && docker inspect --format='{{index .RepoDigests 0}}' messense/cargo-xwin
      image: messense/cargo-xwin@sha256:543cdaeb5cd3ed0ca1dd29b9e5aba4100aa0008f8ed088b793f3b9255a635869
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false
      - name: Install Rust target
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - name: Build
        shell: bash
        run: cargo xwin build --release --target=${{ matrix.target }} --locked
      - name: Prepare Binaries
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/ocx.exe ocx-${{ matrix.target }}.exe
      - name: Upload ocx Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocx-${{ matrix.target }}
          path: ocx-${{ matrix.target }}.exe
          compression-level: 0
          retention-days: 1

  publish:
    name: Publish to dev.ocx.sh
    needs: [compute-version, build-linux, build-darwin, build-windows]
    uses: ./.github/workflows/oci-publish.yml
    with:
      registry: dev.ocx.sh
      repo: ocx
      version_tag: ${{ needs.compute-version.outputs.version_tag }}
      variants: '[""]'
      targets: '["x86_64-unknown-linux-musl","aarch64-unknown-linux-musl","x86_64-apple-darwin","aarch64-apple-darwin","x86_64-pc-windows-msvc","aarch64-pc-windows-msvc"]'
      environment: dev.ocx.sh
    secrets:
      REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
