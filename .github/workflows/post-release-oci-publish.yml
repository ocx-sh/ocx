name: Publish to Registry

# cargo-dist post-announce job. Delegates the platform-loop + push logic to
# `oci-publish.yml`; this workflow only contributes the prod-specific inputs
# (registry, version derivation from tag, cargo-dist archive layout).

on:
  workflow_call:
    inputs:
      plan:
        # Forwarded by cargo-dist; not consumed here, but the contract requires it.
        required: true
        type: string

permissions:
  contents: read

jobs:
  compute-tag:
    # Skip registry publish for pre-release tags (e.g. v0.6.0-canary.1).
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.tag.outputs.version_tag }}
    steps:
      - id: tag
        shell: bash
        run: |
          set -euo pipefail
          # Freeze the UTC build-metadata segment here so every (variant, target)
          # leg of the publish loop shares the same tag. Computing it inside the
          # per-push `ocx package push --build-timestamp` would re-stamp each call
          # at second granularity and split the multi-platform index.
          ts="$(date -u +%Y%m%d%H%M%S)"
          echo "version_tag=${GITHUB_REF_NAME#v}_${ts}" >> "$GITHUB_OUTPUT"

  publish:
    if: ${{ !contains(github.ref_name, '-') }}
    needs: [compute-tag]
    uses: ./.github/workflows/oci-publish.yml
    with:
      registry: ocx.sh
      repo: ocx
      version_tag: ${{ needs.compute-tag.outputs.version_tag }}
      # Prod registry today carries the default ocx variant only. Adding
      # `mirror` here would publish ocx-mirror to ocx.sh — gate that on a
      # separate decision when the time comes.
      variants: '[""]'
      targets: '["x86_64-unknown-linux-musl","aarch64-unknown-linux-musl","x86_64-apple-darwin","aarch64-apple-darwin","x86_64-pc-windows-msvc","aarch64-pc-windows-msvc"]'
      environment: ocx.sh
      artifact_source: cargo-dist
    secrets:
      REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
      REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
