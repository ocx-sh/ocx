name: Test Install Scripts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to test (e.g., v0.1.0). Defaults to latest."
        required: false

permissions:
  contents: read

jobs:
  test-install-sh-ubuntu:
    name: install.sh (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run install.sh
        run: |
          set --
          if [ -n "${{ inputs.release_tag }}" ]; then
            set -- --version "$(echo '${{ inputs.release_tag }}' | sed 's/^v//')"
          fi
          OCX_NO_MODIFY_PATH=1 bash website/src/public/install.sh "$@"
      - name: Verify installation
        run: |
          export PATH="$HOME/.ocx/symlinks/ocx.sh/ocx/cli/current/bin:$PATH"
          ocx version
          test -f "$HOME/.ocx/env"

  test-install-sh-alpine:
    name: install.sh (Alpine)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run in Alpine container
        run: |
          version_arg=""
          if [ -n "${{ inputs.release_tag }}" ]; then
            version_arg="--version $(echo '${{ inputs.release_tag }}' | sed 's/^v//')"
          fi
          docker run --rm \
            -v "$PWD/website/src/public/install.sh:/install.sh" \
            -e OCX_NO_MODIFY_PATH=1 \
            alpine:latest sh -c "
              apk add --no-cache curl tar xz &&
              sh /install.sh $version_arg &&
              export PATH=\"\$HOME/.ocx/symlinks/ocx.sh/ocx/cli/current/bin:\$PATH\" &&
              ocx version &&
              test -f \"\$HOME/.ocx/env\"
            "

  test-install-sh-macos:
    name: install.sh (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run install.sh
        run: |
          set --
          if [ -n "${{ inputs.release_tag }}" ]; then
            set -- --version "$(echo '${{ inputs.release_tag }}' | sed 's/^v//')"
          fi
          OCX_NO_MODIFY_PATH=1 bash website/src/public/install.sh "$@"
      - name: Verify installation
        run: |
          export PATH="$HOME/.ocx/symlinks/ocx.sh/ocx/cli/current/bin:$PATH"
          ocx version
          test -f "$HOME/.ocx/env"

  test-install-ps1-windows:
    name: install.ps1 (Windows ${{ matrix.shell }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # `powershell` is Windows PowerShell 5.1 (default on Windows 10/11);
        # `pwsh` is PowerShell 7+. We test both to guard against version-gated
        # APIs (e.g. Expand-Archive zip-slip protection landed in PS 7.4).
        shell: [powershell, pwsh]
    # `matrix` context is not available on a step's `shell:` key, only on
    # `defaults.run.shell` — set it here so both run steps inherit the matrix
    # shell. (A step-level `shell: ${{ matrix.shell }}` is an invalid-context
    # workflow error that breaks the file's registration.)
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run install.ps1
        run: |
          $env:OCX_NO_MODIFY_PATH = '1'
          if ('${{ inputs.release_tag }}') {
            $Version = '${{ inputs.release_tag }}' -replace '^v', ''
          }
          & ./website/src/public/install.ps1
      - name: Verify installation
        run: |
          $env:PATH = "$env:USERPROFILE\.ocx\symlinks\ocx.sh\ocx\cli\current\bin;$env:PATH"
          ocx version
          Test-Path "$env:USERPROFILE\.ocx\env.ps1"
