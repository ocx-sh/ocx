name: Deploy Website (Release Dispatcher)

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  contents: read

jobs:
  pick-target:
    name: Pick Target
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.pick.outputs.target }}
    steps:
      - name: Resolve target from tag
        id: pick
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" == *-* ]]; then
            echo "target=dev"  >> "$GITHUB_OUTPUT"
          else
            echo "target=prod" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy
    needs: pick-target
    uses: ./.github/workflows/deploy-website.yml
    with:
      target: ${{ needs.pick-target.outputs.target }}
      plan: ${{ inputs.plan }}
    secrets: inherit
