name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-website
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: true

      # --- Recordings (generate .cast files) ---
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Build ocx binary
        run: cargo build --release -p ocx_cli
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Setup Task
        uses: go-task/setup-task@v1
      - name: Generate recordings
        run: task recordings:build

      # --- Website ---
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install Dependencies
        run: bun install
        working-directory: website
      - name: Build with VitePress
        run: task build
        working-directory: website

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/.vitepress/dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: ocx.sh
      url: https://ocx.sh
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: dist/
      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
      - name: Deploy to server
        run: rsync -avz --delete dist/ "$DEPLOY_HOST:"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          RSYNC_RSH: "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=yes"
