name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        type: choice
        options: [dev, prod]
        default: dev
  workflow_call:
    inputs:
      target:
        type: string
        default: dev
      plan:
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-website-${{ inputs.target || 'dev' }}
  cancel-in-progress: false

jobs:
  build-binary:
    name: Build Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build ocx binary
        run: cargo build --release -p ocx --locked
      - name: Generate JSON Schema
        run: |
          mkdir -p website/src/public/schemas/metadata
          cargo run -p ocx_schema --release > website/src/public/schemas/metadata/v1.json
      - name: Upload Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocx-binary
          path: target/release/ocx
      - name: Upload Schema
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-schema
          path: website/src/public/schemas/

  recordings:
    name: Generate Recordings
    needs: build-binary
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-binary
          path: test/bin
      - name: Make Binary Executable
        run: chmod +x test/bin/ocx
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
      - name: Generate recordings
        run: task recordings:build
      - name: Upload Recordings
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-recordings
          path: website/src/public/casts/

  sbom:
    name: Generate SBOM
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7 # v1.16.0
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Generate SBOM and dependencies page
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --manifest-path crates/ocx_cli/Cargo.toml
          mkdir -p website/src/public/data
          uv run scripts/sbom-to-markdown.py \
            --input crates/ocx_cli/ocx.cdx.json \
            --output website/src/docs/reference/dependencies.md \
            --json-output website/src/public/data/dependencies.json
      - name: Upload Dependencies Page
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-dependencies-page
          path: website/src/docs/reference/dependencies.md
      - name: Upload Dependencies Data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-dependencies-data
          path: website/src/public/data/dependencies.json

  catalog:
    name: Generate Catalog
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-binary
          path: bin
      - name: Make Binary Executable
        run: chmod +x bin/ocx
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Generate package catalog
        run: |
          uv run scripts/catalog-generate.py \
            --ocx-binary bin/ocx \
            --output-dir website/src/public/data/catalog \
            --pages-dir website/src/docs/catalog \
            --registry ocx.sh \
            --remote
      - name: Upload Catalog Data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-catalog-data
          path: website/src/public/data/catalog/
      - name: Upload Catalog Pages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-catalog-pages
          path: website/src/docs/catalog/

  website:
    name: Build Website
    needs: [build-binary, recordings, sbom, catalog]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download Recordings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-recordings
          path: website/src/public/casts/
      - name: Download Schema
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-schema
          path: website/src/public/schemas/
      - name: Download Dependencies Page
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-dependencies-page
          path: website/src/docs/reference/
      - name: Download Dependencies Data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-dependencies-data
          path: website/src/public/data/
      - name: Download Catalog Data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-catalog-data
          path: website/src/public/data/catalog/
      - name: Download Catalog Pages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-catalog-pages
          path: website/src/docs/catalog/
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install Dependencies
        run: bun install
        working-directory: website
      - name: Build with VitePress
        run: bunx vitepress build
        working-directory: website
        env:
          OCX_DEPLOY_TARGET: ${{ inputs.target || 'dev' }}
      - name: Upload site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-dist
          path: website/.vitepress/dist/

  deploy:
    name: Deploy
    needs: website
    runs-on: ubuntu-latest
    environment:
      name: ${{ (inputs.target || 'dev') == 'prod' && 'ocx.sh' || 'dev.ocx.sh' }}
      url: ${{ (inputs.target || 'dev') == 'prod' && 'https://ocx.sh' || 'https://dev.ocx.sh' }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-dist
          path: dist/
      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
      - name: Deploy to server
        run: rsync -avz --delete --exclude=/licensed/ dist/ "$DEPLOY_HOST:"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          RSYNC_RSH: "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=yes"
