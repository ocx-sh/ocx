name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        type: choice
        options: [dev, prod]
        default: dev
  workflow_call:
    inputs:
      target:
        type: string
        default: dev
      plan:
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-website-${{ inputs.target || 'dev' }}
  cancel-in-progress: false

jobs:
  build-binary:
    name: Build Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          # `cargo build -p ocx` below compiles ocx_lib + the path-vendored
          # starlark fork; the action's default RUSTFLAGS=-D warnings denies its
          # upstream lints (Cargo does not auto-cap path deps). Scope denial to
          # [workspace.lints.rust] instead.
          rustflags: ""
      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build ocx binary
        run: cargo build --release -p ocx --locked
      - name: Generate JSON Schema
        run: |
          mkdir -p website/src/public/schemas/metadata
          cargo run -p ocx_schema --release > website/src/public/schemas/metadata/v1.json
      - name: Upload Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocx-binary
          path: target/release/ocx
      - name: Upload Schema
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-schema
          path: website/src/public/schemas/

  recordings:
    name: Generate Recordings
    needs: build-binary
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-binary
          path: test/bin
      - name: Make Binary Executable
        run: chmod +x test/bin/ocx
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      - name: Generate recordings
        run: task recordings:build
      - name: Upload Recordings
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-recordings
          path: website/src/public/casts/

  sbom:
    name: Generate SBOM
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Generate SBOM and dependencies page
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --manifest-path crates/ocx_cli/Cargo.toml
          mkdir -p website/src/public/data
          uv run scripts/sbom-to-markdown.py \
            --input crates/ocx_cli/ocx.cdx.json \
            --output website/src/docs/reference/dependencies.md \
            --json-output website/src/public/data/dependencies.json
      - name: Upload Dependencies Page
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-dependencies-page
          path: website/src/docs/reference/dependencies.md
      - name: Upload Dependencies Data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-dependencies-data
          path: website/src/public/data/dependencies.json

  catalog:
    name: Generate Catalog
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-binary
          path: bin
      - name: Make Binary Executable
        run: chmod +x bin/ocx
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Generate package catalog
        run: |
          uv run scripts/catalog-generate.py \
            --ocx-binary bin/ocx \
            --output-dir website/src/public/data/catalog \
            --pages-dir website/src/catalog \
            --registry ocx.sh \
            --remote
      - name: Upload Catalog Data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-catalog-data
          path: website/src/public/data/catalog/
      - name: Upload Catalog Pages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-catalog-pages
          path: website/src/catalog/

  doc-scripts-drift:
    name: Doc Scripts Drift Gate
    needs: build-binary
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-binary
          path: test/bin
      - name: Make Binary Executable
        run: chmod +x test/bin/ocx
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      # Registry-backed drift gate for ALL `# doc:` scripts (not just
      # cast:true).  Deploy-CI only — the ADR cost-lever keeps this out of
      # the per-commit `task verify`; gating publish on it here closes the
      # fail-open seam (Codex D1) before any artifact is uploaded.
      - name: Run doc-script drift gate
        run: task test:doc-scripts:drift
        env:
          SKIP_BUILD: "true"

  doc-scripts:
    name: Generate Doc Scripts
    needs: doc-scripts-drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      - name: Generate Doc Scripts
        run: task website:scripts:publish
      - name: Upload Doc Scripts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-doc-scripts
          path: website/src/_scripts/

  website:
    name: Build Website
    needs: [build-binary, recordings, sbom, catalog, doc-scripts]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download Recordings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-recordings
          path: website/src/public/casts/
      - name: Download Schema
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-schema
          path: website/src/public/schemas/
      - name: Download Dependencies Page
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-dependencies-page
          path: website/src/docs/reference/
      - name: Download Dependencies Data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-dependencies-data
          path: website/src/public/data/
      - name: Download Catalog Data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-catalog-data
          path: website/src/public/data/catalog/
      - name: Download Catalog Pages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-catalog-pages
          path: website/src/catalog/
      - name: Download Doc Scripts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-doc-scripts
          path: website/src/_scripts/
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Install Dependencies
        run: bun install
        working-directory: website
      - name: Build with VitePress
        run: bunx vitepress build
        working-directory: website
        env:
          OCX_DEPLOY_TARGET: ${{ inputs.target || 'dev' }}
      - name: Upload site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: website-dist
          path: website/.vitepress/dist/

  deploy-cloudflare:
    name: Deploy (Cloudflare Pages)
    needs: website
    runs-on: ubuntu-latest
    environment:
      name: ${{ (inputs.target || 'dev') == 'prod' && 'ocx.sh' || 'dev.ocx.sh' }}
      url: ${{ (inputs.target || 'dev') == 'prod' && 'https://ocx.sh' || 'https://dev.ocx.sh' }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: website-dist
          path: dist/
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      # Icons8-licensed assets live in the private R2 bucket `ocx-licensed`
      # (license forbids git redistribution; push via `task website:deploy:licensed`).
      # Overlay into the artifact before deploy — read-only R2 keys, aws-cli
      # is preinstalled on ubuntu runners.
      - name: Overlay licensed assets from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # aws-cli v2.23+ default integrity checksums are not fully R2-compatible.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          aws s3 sync s3://ocx-licensed/ dist/licensed/ \
            --endpoint-url "https://$CF_ACCOUNT.r2.cloudflarestorage.com"
          test -n "$(ls -A dist/licensed/)" # fail loud on an empty overlay
      # Idempotent: create errors harmlessly if the project already exists.
      - name: Ensure Pages project
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler pages project create ocx-website --production-branch=main
      # prod → production deployment (nginx proxies ocx.sh → ocx-website.pages.dev);
      # dev → branch alias (nginx proxies dev.ocx.sh → dev.ocx-website.pages.dev).
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_BRANCH: ${{ (inputs.target || 'dev') == 'prod' && 'main' || 'dev' }}
        run: npx --yes wrangler pages deploy dist --project-name=ocx-website --branch="$WRANGLER_BRANCH"
      # No apex management here: ocx.sh is served by the hetzner nginx, which
      # reverse-proxies to (dev.)ocx-website.pages.dev — Pages is the file
      # host, nginx keeps /v2 (Artifactory) on the same hostnames until the
      # package migration retires it. ocx.rs is parked (ADR Amendment A1);
      # its lingering Pages attachment is disposed manually, not re-ensured.
