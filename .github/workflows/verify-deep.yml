name: Verify Deep

on:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build & Unit Test (${{ matrix.job.name }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: ubuntu-latest, name: Linux, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, name: macOS, target: aarch64-apple-darwin }
          - { os: windows-latest, name: Windows, target: x86_64-pc-windows-msvc }
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Build
        uses: ./.github/actions/build-rust
        with:
          target: ${{ matrix.job.target }}
      - name: Install nextest
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-nextest
      - name: Test
        run: cargo nextest run --workspace --target=${{ matrix.job.target }} --profile ci --locked
      - name: Setup Task
        if: matrix.job.name == 'Linux'
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      - name: Generate Schema
        if: matrix.job.name == 'Linux'
        run: task schema:generate
      - name: Upload Schema
        if: matrix.job.name == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocx-schema
          path: website/src/public/schemas/metadata/v1.json
          retention-days: 1
      - name: Upload Test Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deep-unit-${{ matrix.job.name }}
          path: target/nextest/ci/junit.xml

  cross-compile:
    name: Cross-compile (${{ matrix.job.name }})
    runs-on: ubuntu-latest
    container:
      image: messense/cargo-xwin
    strategy:
      fail-fast: false
      matrix:
        job:
          # x86_64-pc-windows-msvc is now built natively in the `build` job
          # (windows-latest leg) so it can execute unit tests, including the
          # cfg(target_os = "windows") F1/F2 cannot-recur tests. Cross-compile
          # leg keeps aarch64 only — no native arm64 Windows runner on GitHub.
          - { name: Windows ARM64, target: aarch64-pc-windows-msvc }
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Install Rust target
        run: rustup target add ${{ matrix.job.target }}
      - name: Build
        run: cargo xwin build --release --target=${{ matrix.job.target }} --locked
      - name: Prepare Binaries
        run: |
          cp target/${{ matrix.job.target }}/release/ocx.exe ocx-${{ matrix.job.target }}.exe
          cp target/${{ matrix.job.target }}/release/ocx-mirror.exe ocx-mirror-${{ matrix.job.target }}.exe
      - name: Upload ocx Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocx-${{ matrix.job.target }}
          path: ocx-${{ matrix.job.target }}.exe
          compression-level: 0
          retention-days: 7
      - name: Upload ocx-mirror Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocx-mirror-${{ matrix.job.target }}
          path: ocx-mirror-${{ matrix.job.target }}.exe
          compression-level: 0
          retention-days: 7

  acceptance-tests:
    name: Acceptance (${{ matrix.job.name }})
    needs: [build, cross-compile]
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # No macOS entry: arm64 runners (macos-14/15) lack nested virtualization
          # so Docker/Colima cannot run. Intel runners (macos-13) support Colima but
          # add ~$0.87/run and complexity for marginal gain over the arm64 unit tests
          # in the build job. Revisit if GitHub ships M3 runners with nested virt.
          #
          # No Windows entry: the embedded `registry:2` Docker image does not run
          # reliably on `windows-latest` runners (Linux container under Hyper-V
          # routing issues). F1 / F2 cannot-recur coverage is provided by the
          # `windows-latest` leg of the `build` job above via cfg(target_os =
          # "windows") unit tests. See ADR adr_file_lock_unification.md §CI
          # Integration. Revisit if a stable Windows registry option appears.
          - { os: ubuntu-latest, name: Linux, target: x86_64-unknown-linux-gnu, ext: "" }
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Start Registry
        shell: bash
        run: |
          docker run -d --name test-registry -p 5000:5000 registry:2
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/v2/ > /dev/null 2>&1; then
              echo "Registry is ready"
              exit 0
            fi
            sleep 0.5
          done
          echo "::error::Registry did not become reachable"
          exit 1
      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-${{ matrix.job.target }}
          path: test/bin
      - name: Download Mirror Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-mirror-${{ matrix.job.target }}
          path: test/bin
      - name: Download Schema
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-schema
          path: website/src/public/schemas/metadata
      - name: Prepare Binaries
        shell: bash
        run: |
          mv "test/bin/ocx-${{ matrix.job.target }}${{ matrix.job.ext }}" "test/bin/ocx${{ matrix.job.ext }}"
          mv "test/bin/ocx-mirror-${{ matrix.job.target }}${{ matrix.job.ext }}" "test/bin/ocx-mirror${{ matrix.job.ext }}"
          chmod +x test/bin/ocx${{ matrix.job.ext }} test/bin/ocx-mirror${{ matrix.job.ext }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      - name: Run Acceptance Tests
        shell: bash
        run: task test -- --junit-xml=results/junit.xml
        env:
          OCX_MIRROR_COMMAND: ${{ github.workspace }}/test/bin/ocx-mirror${{ matrix.job.ext }}
      - name: Stop Registry
        if: ${{ always() }}
        shell: bash
        run: docker rm -f test-registry 2>/dev/null || true
      - name: Upload Test Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deep-acceptance-${{ matrix.job.name }}
          path: test/results/junit.xml

  test-results:
    name: Publish Deep Test Results
    needs: [build, cross-compile, acceptance-tests]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: deep-*
          path: artifacts
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: "artifacts/**/junit.xml"
          check_name: "Deep Test Results"
