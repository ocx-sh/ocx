name: Verify Deep

on:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build & Unit Test (${{ matrix.job.name }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { os: ubuntu-latest, name: Linux, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, name: macOS, target: aarch64-apple-darwin }
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Build
        uses: ./.github/actions/build-rust
        with:
          target: ${{ matrix.job.target }}
      - name: Install nextest
        uses: taiki-e/install-action@6ef672efc2b5aabc787a9e94baf4989aa02a97df # v2.70.3
        with:
          tool: cargo-nextest
      - name: Test
        run: cargo nextest run --workspace --target=${{ matrix.job.target }} --profile ci --locked
      - name: Upload Test Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: deep-unit-${{ matrix.job.name }}
          path: target/nextest/ci/junit.xml

  cross-compile:
    name: Cross-compile (${{ matrix.job.name }})
    runs-on: ubuntu-latest
    container:
      image: messense/cargo-xwin
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: Windows x64, target: x86_64-pc-windows-msvc }
          - { name: Windows ARM64, target: aarch64-pc-windows-msvc }
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - name: Install Rust target
        run: rustup target add ${{ matrix.job.target }}
      - name: Build
        run: cargo xwin build --release --target=${{ matrix.job.target }} --locked
      - name: Prepare Binaries
        run: |
          cp target/${{ matrix.job.target }}/release/ocx.exe ocx-${{ matrix.job.target }}.exe
          cp target/${{ matrix.job.target }}/release/ocx-mirror.exe ocx-mirror-${{ matrix.job.target }}.exe
      - name: Upload ocx Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ocx-${{ matrix.job.target }}
          path: ocx-${{ matrix.job.target }}.exe
          compression-level: 0
          retention-days: 7
      - name: Upload ocx-mirror Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ocx-mirror-${{ matrix.job.target }}
          path: ocx-mirror-${{ matrix.job.target }}.exe
          compression-level: 0
          retention-days: 7

  acceptance-tests:
    name: Acceptance (${{ matrix.job.name }})
    needs: [build, cross-compile]
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # No macOS entry: arm64 runners (macos-14/15) lack nested virtualization
          # so Docker/Colima cannot run. Intel runners (macos-13) support Colima but
          # add ~$0.87/run and complexity for marginal gain over the arm64 unit tests
          # in the build job. Revisit if GitHub ships M3 runners with nested virt.
          - { os: ubuntu-latest, name: Linux, target: x86_64-unknown-linux-gnu, ext: "" }
          - { os: windows-latest, name: Windows, target: x86_64-pc-windows-msvc, ext: ".exe" }
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Start Registry
        shell: bash
        run: |
          docker run -d --name test-registry -p 5000:5000 registry:2
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/v2/ > /dev/null 2>&1; then
              echo "Registry is ready"
              exit 0
            fi
            sleep 0.5
          done
          echo "::error::Registry did not become reachable"
          exit 1
      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-${{ matrix.job.target }}
          path: test/bin
      - name: Download Mirror Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-mirror-${{ matrix.job.target }}
          path: test/bin
      - name: Prepare Binaries
        shell: bash
        run: |
          mv "test/bin/ocx-${{ matrix.job.target }}${{ matrix.job.ext }}" "test/bin/ocx${{ matrix.job.ext }}"
          mv "test/bin/ocx-mirror-${{ matrix.job.target }}${{ matrix.job.ext }}" "test/bin/ocx-mirror${{ matrix.job.ext }}"
          chmod +x test/bin/ocx${{ matrix.job.ext }} test/bin/ocx-mirror${{ matrix.job.ext }}
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Setup Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
      - name: Run Acceptance Tests
        shell: bash
        run: task test -- --junit-xml=results/junit.xml
        env:
          OCX_MIRROR_COMMAND: ${{ github.workspace }}/test/bin/ocx-mirror${{ matrix.job.ext }}
      - name: Stop Registry
        if: ${{ always() }}
        shell: bash
        run: docker rm -f test-registry 2>/dev/null || true
      - name: Upload Test Results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: deep-acceptance-${{ matrix.job.name }}
          path: test/results/junit.xml

  test-results:
    name: Publish Deep Test Results
    needs: [build, cross-compile, acceptance-tests]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: deep-*
          path: artifacts
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: "artifacts/**/junit.xml"
          check_name: "Deep Test Results"
