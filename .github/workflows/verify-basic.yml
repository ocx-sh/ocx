name: Basic Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  conventional-commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Check conventional commits
        uses: cocogitto/cocogitto-action@52d0023b4396897f1815648e553db2ab8d782f3a # v4.2.0
        with:
          command: check
          args: "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup OCX
        uses: ./.github/actions/setup-ocx
        with:
          version: '0.3.7'
      - name: Lint workflows
        # `ocx run` composes the project toolchain (actionlint + shellcheck +
        # go-task) from ocx.lock and runs the task hermetically — same gate as
        # local `task ci:actionlint`.
        run: ocx run -- task ci:actionlint

  smoke:
    name: Smoke (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          matcher: true
          # Defer warning-denial to [workspace.lints.rust]. The action's default
          # RUSTFLAGS=-D warnings is global and also denies the path-vendored
          # starlark fork (Cargo auto-caps registry/git deps, not path deps),
          # turning its upstream lints into hard build errors.
          rustflags: ""
      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Setup Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      - name: Install nextest
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-nextest
      - name: Check formatting
        id: fmt
        run: task rust:format:check
        continue-on-error: true
      - name: Clippy
        id: clippy
        run: task rust:clippy:check
        continue-on-error: true
      - name: Build
        run: task rust:build
      # Upload the acceptance binary *before* the Test step. `task rust:build`
      # compiles target/release/ocx with `--features ocx/__testing`, enabling the
      # `__OCX_SELF_IMAGE` seam that the self-setup / self-update acceptance tests
      # rely on to redirect the canonical `ocx.sh/ocx/cli` identifier to the local
      # fixture registry. The Test step below runs `cargo nextest --workspace
      # --release` WITHOUT that feature, which recompiles and overwrites
      # target/release/ocx seam-free — so a download after Test would ship a
      # binary that ignores the redirect and every self-* acceptance test fails.
      - name: Upload Binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocx-binary
          path: target/release/ocx
          compression-level: 0
          retention-days: 1
      - name: Test
        run: task rust:test:unit -- --profile ci
      - name: Generate Schema
        run: task schema:generate
      - name: Upload Schema
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ocx-schema
          path: website/src/public/schemas/metadata/v1.json
          retention-days: 1
      - name: Publish Unit Test Results
        if: ${{ !cancelled() }}
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: target/nextest/ci/junit.xml
          check_name: "Unit Test Results"
      - name: Check lint results
        if: ${{ !cancelled() }}
        run: |
          if [[ "${{ steps.fmt.outcome }}" == "failure" || "${{ steps.clippy.outcome }}" == "failure" ]]; then
            echo "::error::Lint checks failed (fmt=${{ steps.fmt.outcome }}, clippy=${{ steps.clippy.outcome }})"
            exit 1
          fi

  acceptance-tests:
    name: Acceptance Tests
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Start acceptance registry
        shell: bash
        run: |
          # zot (OCI 1.1 Referrers API) is the primary acceptance registry —
          # distribution's registry:2/registry:3 do NOT serve
          # /v2/<name>/referrers/<digest> (#195). Started from the compose file
          # (single source of truth, no image drift). Both services run so the
          # registry:2 negative fixture (legacy_registry, #106) is CI-provable
          # and the mirror tests run in CI too (deliberate scope expansion).
          docker compose -f test/docker-compose.yml up -d registry mirror-registry
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:5000/v2/ > /dev/null 2>&1; then
              echo "Registry is ready"; exit 0
            fi
            sleep 0.5
          done
          echo "::error::Registry did not become reachable"; exit 1
      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-binary
          path: test/bin
      - name: Prepare Binaries
        run: chmod +x test/bin/ocx
      - name: Download Schema
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-schema
          path: website/src/public/schemas/metadata
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Setup Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
      - name: Run Acceptance Tests
        run: task test:parallel -- --junit-xml=results/junit.xml
      - name: Publish Acceptance Test Results
        if: ${{ !cancelled() }}
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: test/results/junit.xml
          check_name: "Acceptance Test Results"
