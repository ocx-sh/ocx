name: Basic Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  smoke:
    name: Smoke (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1.15.3
        with:
          toolchain: stable
          components: clippy,rustfmt
          matcher: true
      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Setup Task
        uses: go-task/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1.0.0
      - name: Install nextest
        uses: taiki-e/install-action@a37010ded18ff788be4440302bd6830b1ae50d8b # v2.68.25
        with:
          tool: cargo-nextest
      - name: Check formatting
        id: fmt
        run: task format:check
        continue-on-error: true
      - name: Clippy
        id: clippy
        run: task clippy:check
        continue-on-error: true
      - name: Build
        run: task build
      - name: Test
        run: task test:unit -- --profile ci
      - name: Upload Binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ocx-binary
          path: target/release/ocx
          compression-level: 0
          retention-days: 1
      - name: Publish Unit Test Results
        if: ${{ !cancelled() }}
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: target/nextest/ci/junit.xml
          check_name: "Unit Test Results"
      - name: Check lint results
        if: ${{ !cancelled() }}
        run: |
          if [[ "${{ steps.fmt.outcome }}" == "failure" || "${{ steps.clippy.outcome }}" == "failure" ]]; then
            echo "::error::Lint checks failed (fmt=${{ steps.fmt.outcome }}, clippy=${{ steps.clippy.outcome }})"
            exit 1
          fi

  acceptance-tests:
    name: Acceptance Tests
    needs: smoke
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Download Binary
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ocx-binary
          path: test/bin
      - name: Prepare Binary
        run: chmod +x test/bin/ocx
      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      - name: Setup Task
        uses: go-task/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1.0.0
      - name: Run Acceptance Tests
        run: task test -- --junit-xml=results/junit.xml
      - name: Publish Acceptance Test Results
        if: ${{ !cancelled() }}
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: test/results/junit.xml
          check_name: "Acceptance Test Results"
