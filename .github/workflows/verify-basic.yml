name: Basic Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  conventional-commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Check conventional commits
        uses: cocogitto/cocogitto-action@52d0023b4396897f1815648e553db2ab8d782f3a # v4.2.0
        with:
          command: check
          args: "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  smoke:
    name: Smoke (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          matcher: true
      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Setup Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
      - name: Install nextest
        uses: taiki-e/install-action@94cb46f8d6e437890146ffbd78a778b78e623fb2 # v2.74.0
        with:
          tool: cargo-nextest
      - name: Check formatting
        id: fmt
        run: task rust:format:check
        continue-on-error: true
      - name: Clippy
        id: clippy
        run: task rust:clippy:check
        continue-on-error: true
      - name: Build
        run: task rust:build
      - name: Test
        run: task rust:test:unit -- --profile ci
      - name: Build Mirror
        run: cargo build --release -p ocx_mirror --locked
      - name: Upload Binaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ocx-binary
          path: |
            target/release/ocx
            target/release/ocx-mirror
          compression-level: 0
          retention-days: 1
      - name: Publish Unit Test Results
        if: ${{ !cancelled() }}
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: target/nextest/ci/junit.xml
          check_name: "Unit Test Results"
      - name: Check lint results
        if: ${{ !cancelled() }}
        run: |
          if [[ "${{ steps.fmt.outcome }}" == "failure" || "${{ steps.clippy.outcome }}" == "failure" ]]; then
            echo "::error::Lint checks failed (fmt=${{ steps.fmt.outcome }}, clippy=${{ steps.clippy.outcome }})"
            exit 1
          fi

  acceptance-tests:
    name: Acceptance Tests
    needs: smoke
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Download Binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ocx-binary
          path: test/bin
      - name: Prepare Binaries
        run: chmod +x test/bin/ocx test/bin/ocx-mirror
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Setup Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
      - name: Run Acceptance Tests
        run: task test -- --junit-xml=results/junit.xml
        env:
          OCX_MIRROR_COMMAND: ${{ github.workspace }}/test/bin/ocx-mirror
      - name: Publish Acceptance Test Results
        if: ${{ !cancelled() }}
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          files: test/results/junit.xml
          check_name: "Acceptance Test Results"
