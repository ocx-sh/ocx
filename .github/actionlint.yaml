# actionlint configuration.
# Docs: https://github.com/rhysd/actionlint/blob/main/docs/config.md

# release.yml is generated by cargo-dist (`dist generate-ci`) and must never be
# hand-edited (see .claude/rules/workflow-release.md). Its drift is policed by
# verify-release-ci.yml (`dist generate --check`), not by actionlint, so ignore
# every finding actionlint reports against it.
paths:
  .github/workflows/release.yml:
    ignore:
      - ".*"
