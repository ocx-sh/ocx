name: Build Rust Binary
description: Build an ocx binary for a given target (native builds or zig cross-compile)

inputs:
  target:
    description: Rust target triple
    required: true
  use_zigbuild:
    description: Use cargo-zigbuild instead of cargo build (required for cross-compiling aarch64-linux and musl from x86 runners)
    required: false
    default: "false"
  features:
    description: Space/comma-separated cargo features (e.g. `ocx/__testing` for acceptance binaries). Empty = release-clean.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable
        targets: ${{ inputs.target }}
    - name: Install target on rust-toolchain.toml channel
      # rust-toolchain.toml pins an explicit channel; dtolnay's `targets:` only
      # adds the target to the `stable` alias toolchain. Re-add against the
      # pinned channel resolved from the workspace root so cargo finds std/core.
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
      run: rustup target add "$TARGET"
    - name: Rust Cache
      uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
      with:
        save-if: ${{ github.ref == 'refs/heads/main' }}
    - name: Install Zig
      if: ${{ inputs.use_zigbuild == 'true' }}
      uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
    - name: Install cargo-zigbuild
      if: ${{ inputs.use_zigbuild == 'true' }}
      uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a # v2.75.17
      with:
        tool: cargo-zigbuild
    - name: Build (cargo)
      if: ${{ inputs.use_zigbuild != 'true' }}
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
        FEATURES: ${{ inputs.features }}
      run: cargo build --release --target="$TARGET" --locked ${FEATURES:+--features "$FEATURES"}
    - name: Build (zigbuild)
      if: ${{ inputs.use_zigbuild == 'true' }}
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
        FEATURES: ${{ inputs.features }}
      run: cargo zigbuild --release --target="$TARGET" --locked ${FEATURES:+--features "$FEATURES"}
    - name: Prepare Binaries
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
      run: |
        ext=""
        [[ "$TARGET" == *windows* ]] && ext=".exe"
        cp "target/${TARGET}/release/ocx${ext}" "ocx-${TARGET}${ext}"
    - name: Upload ocx Binary
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ocx-${{ inputs.target }}
        path: ocx-${{ inputs.target }}${{ contains(inputs.target, 'windows') && '.exe' || '' }}
        compression-level: 0
        retention-days: 7
