version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci(deps)"
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-deps:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
